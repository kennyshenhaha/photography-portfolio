        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* ================= 科技感自訂游標 (僅限電腦版) ================= */
        @media (pointer: fine) {
            body, a, button, .tap-zone, .nav-arrow, .play-btn-pulse, .metal-btn, .accordion-toggle {
                cursor: none !important;
            }
        }
        .custom-cursor {
            position: fixed; top: 0; left: 0; width: 6px; height: 6px; margin-top: -3px; margin-left: -3px;
            background: #fff; border-radius: 50%; pointer-events: none; z-index: 10000;
            transition: width 0.3s, height 0.3s, background-color 0.3s, margin 0.3s;
            mix-blend-mode: difference;
        }
        .custom-cursor-follower {
            position: fixed; top: 0; left: 0; width: 40px; height: 40px; margin-top: -20px; margin-left: -20px;
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%; pointer-events: none; z-index: 9999;
            transition: width 0.3s, height 0.3s, background-color 0.3s, border-color 0.3s, margin 0.3s;
        }
        /* 游標懸停狀態 */
        .custom-cursor.hovered {
            width: 12px; height: 12px; margin-top: -6px; margin-left: -6px; background: #f3e5ab; mix-blend-mode: normal;
        }
        .custom-cursor-follower.hovered {
            width: 60px; height: 60px; margin-top: -30px; margin-left: -30px; 
            border-color: rgba(243, 229, 171, 0.6); background: rgba(243, 229, 171, 0.05);
        }

        /* ================= 電影級進場動畫 ================= */
        .cinematic-element {
            opacity: 0; transform: translateY(30px);
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .cinematic-scale {
            opacity: 0; transform: scale(0.8);
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .hero-loaded .cinematic-element { opacity: 1; transform: translateY(0); }
        .hero-loaded .cinematic-scale { opacity: 1; transform: scale(1); }
        .delay-1 { transition-delay: 0.3s; }
        .delay-2 { transition-delay: 0.5s; }
        .delay-3 { transition-delay: 0.7s; }
        .delay-4 { transition-delay: 0.9s; }

        /* 鈦金掃光文字核心樣式 */
        .titanium-text {
            position: relative;
            display: inline-block;
            background: 
                linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.8) 50%, transparent 60%),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0) 0px, rgba(255, 255, 255, 0.05) 1px, rgba(255, 255, 255, 0) 2px),
                linear-gradient(135deg, #f3e5ab 0%, #e5e4e2 30%, #b8a99a 50%, #d1c4b2 70%, #a89f91 100%);
            background-size: 200% 100%, 100% 100%, 100% 100%;
            background-position-x: 120%, 0%, 0%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.3));
            letter-spacing: -0.02em;
            animation: shine-sweep 5s infinite linear;
        }

        @keyframes shine-sweep {
            0% { background-position-x: 160%, 0%, 0%; }
            25% { background-position-x: -60%, 0%, 0%; }
            100% { background-position-x: -60%, 0%, 0%; }
        }

        /* 銀色金屬按鈕 */
        .metal-btn {
            position: relative;
            background: 
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0) 0px, rgba(255, 255, 255, 0.05) 1px, rgba(255, 255, 255, 0) 2px),
                linear-gradient(145deg, #f5f5f5 0%, #cfcfcf 45%, #a1a1a1 55%, #7a7a7a 100%);
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.6), inset 0 -2px 3px rgba(0,0,0,0.5), 0 15px 35px rgba(255,255,255,0.1);
            border: 1px solid #999;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }
        .metal-btn::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            transform: skewX(-20deg); z-index: 2;
        }
        .group:hover .metal-btn::after {
            animation: metal-sweep 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes metal-sweep { 0% { left: -150%; } 100% { left: 200%; } }

        /* 背景發光 */
        .bg-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 120vw; height: 120vw; max-width: 1000px;
            background: radial-gradient(circle at center, rgba(243, 229, 171, 0.3) 0%, rgba(255, 255, 255, 0.15) 25%, rgba(255, 255, 255, 0.05) 50%, transparent 75%);
            filter: blur(40px); mix-blend-mode: screen; z-index: 0; pointer-events: none;
        }

        /* 作品集輪播區 */
        .slider-section { height: 100vh; width: 100%; position: relative; background: #000; overflow: hidden; }
        .slide-container { position: relative; width: 100%; height: 100%; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .slide.active { opacity: 1; z-index: 10; }
        .slide picture { display: contents; }
        .slide img { max-width: 100%; max-height: 80vh; width: auto; height: auto; object-fit: contain; }

        /* Reels 頂部分段進度條 */
        .reels-progress-bar {
            position: absolute; top: 20px; left: 20px; right: 20px; display: flex; gap: 6px;
            z-index: 80; transition: top 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .progress-seg { height: 2px; flex: 1; background: rgba(255, 255, 255, 0.15); border-radius: 4px; overflow: hidden; position: relative; }
        .progress-seg-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: #fff; transition: width 0.1s linear; }

        /* 隱形點擊區域 (手機端使用) */
        .tap-zone { position: absolute; top: 0; bottom: 0; width: 30%; z-index: 100; cursor: pointer; }
        .tap-left { left: 0; }
        .tap-right { right: 0; }

        /* 電腦版半透明箭頭 */
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%); width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: rgba(255, 255, 255, 0.5);
            cursor: pointer; z-index: 110; transition: all 0.3s ease; backdrop-filter: blur(5px);
        }
        .nav-arrow:hover { background: rgba(255, 255, 255, 0.15); color: #fff; transform: translateY(-50%) scale(1.1); }
        .arrow-left { left: 30px; }
        .arrow-right { right: 30px; }

        .frame-ui { position: fixed; inset: 20px; border: 1px solid rgba(255,255,255,0.03); pointer-events: none; z-index: 100; }

        .play-btn-pulse::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2); animation: ring 2.5s infinite;
        }
        @keyframes ring { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }

        /* ================= 折疊選單 (Accordion) 特效 ================= */
        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .accordion-content.is-open {
            grid-template-rows: 1fr;
        }
        .accordion-inner {
            overflow: hidden;

        // ================= 折疊選單 (Accordion) 互動邏輯 =================
        document.querySelectorAll('.accordion-toggle').forEach(button => {
            button.addEventListener('click', () => {
                const group = button.closest('.accordion-group');
                const content = group.querySelector('.accordion-content');
                const icon = group.querySelector('.accordion-icon');
                
                // 檢查目前是否為開啟狀態
                const isOpen = content.classList.contains('is-open');
                
                // 先將所有的折疊選單關閉 (確保一次只開一個)
                document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('is-open'));
                document.querySelectorAll('.accordion-icon').forEach(i => i.classList.remove('rotate-180'));
                document.querySelectorAll('.accordion-group').forEach(g => g.classList.remove('bg-white/5'));

                // 如果原本是關的，就打開它
                if (!isOpen) {
                    content.classList.add('is-open');
                    icon.classList.add('rotate-180');
                    group.classList.add('bg-white/5'); // 展開時背景稍微亮一點
                }
            });
        });

        // ================= 自訂游標邏輯 (僅電腦版) =================
        const cursorDot = document.getElementById('cursor-dot');
        const cursorRing = document.getElementById('cursor-ring');
        
        if (window.matchMedia("(pointer: fine)").matches && cursorDot && cursorRing) {
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let ringX = mouseX;
            let ringY = mouseY;

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                cursorDot.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0)`;
            });

            function animateCursor() {
                ringX += (mouseX - ringX) * 0.15;
                ringY += (mouseY - ringY) * 0.15;
                cursorRing.style.transform = `translate3d(${ringX}px, ${ringY}px, 0)`;
                requestAnimationFrame(animateCursor);
            }
            animateCursor();

            const interactiveSelectors = 'a, button, .tap-zone, .nav-arrow, .play-btn-pulse, .accordion-toggle';
            
            document.addEventListener('mouseover', (e) => {
                if (e.target.closest(interactiveSelectors)) {
                    cursorDot.classList.add('hovered');
                    cursorRing.classList.add('hovered');
                }
            });
            document.addEventListener('mouseout', (e) => {
                if (e.target.closest(interactiveSelectors)) {
                    cursorDot.classList.remove('hovered');
                    cursorRing.classList.remove('hovered');
                }
            });
        }

        // ================= 頁面過渡動畫與電影進場邏輯 =================
        const pageTransition = document.getElementById('page-transition');
        const heroSection = document.getElementById('hero-section');
        
        function hideTransition() {
            pageTransition.classList.remove('opacity-100');
            pageTransition.classList.add('opacity-0');
            setTimeout(() => { heroSection.classList.add('hero-loaded'); }, 100);
        }

        document.addEventListener('DOMContentLoaded', hideTransition);
        window.addEventListener('load', hideTransition);
        window.addEventListener('pageshow', hideTransition);
        setTimeout(hideTransition, 500); 

        // 攔截所有連結點擊 (過渡黑幕效果)
        document.addEventListener('click', function(e) {
            const anchor = e.target.closest('a');
            if (!anchor) return; 

            const href = anchor.getAttribute('href');
            const target = anchor.getAttribute('target');
            const onclick = anchor.getAttribute('onclick');
            
            if (href && !href.startsWith('#') && !href.startsWith('javascript') && target !== '_blank' && !anchor.hasAttribute('download') && !onclick) {
                e.preventDefault(); 
                pageTransition.classList.remove('opacity-0');
                pageTransition.classList.add('opacity-100');
                
                setTimeout(() => {
                    window.location.href = href;
                }, 400);
            }
        });

        // ================= 作品集輪播邏輯 =================
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        const progressContainer = document.getElementById('reels-progress');
        const slider = document.getElementById('works-slider');
        
        let progress = 0;
        let isPaused = true; 
        let hasStarted = false; 
        const duration = 5000; 
        const interval = 100;
        const step = 100 / (duration / interval);

        slides.forEach((_, i) => {
            const seg = document.createElement('div');
            seg.className = 'progress-seg';
            seg.innerHTML = `<div class="progress-seg-fill" id="fill-${i}"></div>`;
            progressContainer.appendChild(seg);
        });

        setTimeout(() => {
            const firstFill = document.getElementById('fill-0');
            if (firstFill) firstFill.style.width = '100%';
        }, 50);

        function updateProgressBarPosition() {
            if (window.innerWidth <= 768 && window.innerHeight > window.innerWidth) {
                const activeImg = slides[currentSlide].querySelector('img');
                if (activeImg) {
                    if (!activeImg.complete) activeImg.onload = updateProgressBarPosition;
                    const rect = activeImg.getBoundingClientRect();
                    const sliderRect = slider.getBoundingClientRect();
                    let newTop = rect.top - sliderRect.top - 15;
                    newTop = Math.max(20, newTop); 
                    progressContainer.style.top = newTop + 'px';
                }
            } else {
                progressContainer.style.top = '20px';
            }
        }

        function changeSlide(direction) {
            if (!hasStarted && direction > 0) {
                hasStarted = true;
                isPaused = false;
            }

            slides[currentSlide].classList.remove('active');
            
            const oldFill = document.getElementById(`fill-${currentSlide}`);
            if (direction > 0) oldFill.style.width = '100%';
            else oldFill.style.width = '0%';

            currentSlide = (currentSlide + direction + totalSlides) % totalSlides;
            slides[currentSlide].classList.add('active');
            progress = 0;
            
            document.getElementById(`fill-${currentSlide}`).style.width = '0%';
            updateProgressBarPosition();

            if (currentSlide === 0) {
                isPaused = true; hasStarted = false;
                setTimeout(() => {
                    slides.forEach((_, i) => {
                        const fill = document.getElementById(`fill-${i}`);
                        if(fill) fill.style.width = i === 0 ? '100%' : '0%';
                    });
                }, 200); 
            } else {
                isPaused = false; hasStarted = true;
                if (direction < 0 && currentSlide === totalSlides - 1) {
                    slides.forEach((_, i) => {
                        const fill = document.getElementById(`fill-${i}`);
                        if (fill && i < currentSlide) fill.style.width = '100%';
                    });
                }
            }
        }

        setInterval(() => {
            const rect = slider.getBoundingClientRect();
            const isInView = rect.top < window.innerHeight && rect.bottom > 0;
            if (!isPaused && isInView && hasStarted) {
                progress += step;
                const currentFill = document.getElementById(`fill-${currentSlide}`);
                if (currentFill) currentFill.style.width = `${progress}%`;
                if (progress >= 100) changeSlide(1);
            }
        }, interval);

        document.getElementById('tap-prev').addEventListener('click', () => changeSlide(-1));
        document.getElementById('tap-next').addEventListener('click', () => changeSlide(1));
        document.getElementById('arrow-prev').addEventListener('click', (e) => { e.stopPropagation(); changeSlide(-1); });
        document.getElementById('arrow-next').addEventListener('click', (e) => { e.stopPropagation(); changeSlide(1); });

        slider.addEventListener('touchstart', () => { if(hasStarted) isPaused = true; });
        slider.addEventListener('touchend', () => { if(hasStarted) isPaused = false; });
        slider.addEventListener('mousedown', () => { if(hasStarted) isPaused = true; });
        slider.addEventListener('mouseup', () => { if(hasStarted) isPaused = false; });

        window.addEventListener('load', updateProgressBarPosition);
        window.addEventListener('resize', updateProgressBarPosition);

        // ================= 底部滑動選單邏輯 =================
        const fabContainer = document.getElementById('fab-container');
        const fabMenu = document.getElementById('fab-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const bottomSheet = document.getElementById('bottom-sheet');
        const dragHandle = document.getElementById('drag-handle');

        function openMenu() {
            menuOverlay.classList.remove('opacity-0', 'pointer-events-none');
            bottomSheet.classList.remove('translate-y-full');
            fabContainer.classList.add('translate-y-12', 'opacity-0', 'pointer-events-none'); 
            document.body.style.overflow = 'hidden'; 
        }

        function closeMenu() {
            menuOverlay.classList.add('opacity-0', 'pointer-events-none');
            bottomSheet.classList.add('translate-y-full');
            fabContainer.classList.remove('translate-y-12', 'opacity-0', 'pointer-events-none'); 
            document.body.style.overflow = '';
            setFabState('full');
            resetIdleTimer();

            // 關閉選單時，將所有折疊收起
            setTimeout(() => {
                document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('is-open'));
                document.querySelectorAll('.accordion-icon').forEach(i => i.classList.remove('rotate-180'));
            }, 300);
        }

        fabMenu.addEventListener('click', openMenu);
        menuOverlay.addEventListener('click', closeMenu);
        dragHandle.addEventListener('click', closeMenu);

        let menuTouchStartY = 0;
        bottomSheet.addEventListener('touchstart', (e) => {
            if(e.target.closest('.overflow-y-auto')) return;
            menuTouchStartY = e.touches[0].clientY;
        });
        bottomSheet.addEventListener('touchmove', (e) => {
            if(e.target.closest('.overflow-y-auto')) return;
            if (e.touches[0].clientY - menuTouchStartY > 60) closeMenu();
        });

        // ================= 進階按鈕顯示邏輯 =================
        let idleTimer;
        let lastScrollY = window.scrollY;

        function setFabState(state) {
            if (!bottomSheet.classList.contains('translate-y-full')) return;
            
            fabContainer.classList.remove(
                'opacity-100', 'translate-y-0', 'scale-100', 
                'opacity-40', 'translate-y-4', 'scale-90', 
                'opacity-0', 'translate-y-12', 'pointer-events-none'
            );

            if (state === 'full') {
                fabContainer.classList.add('opacity-100', 'translate-y-0', 'scale-100');
            } else if (state === 'semi') {
                fabContainer.classList.add('opacity-40', 'translate-y-4', 'scale-90');
            } else if (state === 'hidden') {
                fabContainer.classList.add('opacity-0', 'translate-y-12', 'scale-90', 'pointer-events-none');
            }
        }

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            if (window.scrollY > window.innerHeight * 0.3) {
                idleTimer = setTimeout(() => {
                    setFabState('hidden');
                }, 1000); 
            }
        }

        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;
            if (currentScrollY > lastScrollY && currentScrollY > 100) {
                setFabState('semi');
            } else {
                setFabState('full');
            }
            lastScrollY = currentScrollY;
            resetIdleTimer();
        }, {passive: true});

        ['touchstart', 'mousemove', 'click'].forEach(event => {
            window.addEventListener(event, () => {
                setFabState('full');
                resetIdleTimer();
            }, {passive: true});
        });

        setFabState('full');
        resetIdleTimer();

    </script>
</body>
</html>
