<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENNY SHEN | PORTFOLIO 2026</title>
    <!-- 引入字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&family=Noto+Sans+TC:wght@100;300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* 鈦金掃光文字核心樣式 */
        .titanium-text {
            position: relative;
            display: inline-block;
            background: 
                linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.8) 50%, transparent 60%),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0) 0px, rgba(255, 255, 255, 0.05) 1px, rgba(255, 255, 255, 0) 2px),
                linear-gradient(135deg, #f3e5ab 0%, #e5e4e2 30%, #b8a99a 50%, #d1c4b2 70%, #a89f91 100%);
            background-size: 200% 100%, 100% 100%, 100% 100%;
            background-position-x: 120%, 0%, 0%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.3));
            letter-spacing: -0.02em;
            animation: shine-sweep 5s infinite linear;
        }

        @keyframes shine-sweep {
            0% { background-position-x: 160%, 0%, 0%; }
            25% { background-position-x: -60%, 0%, 0%; }
            100% { background-position-x: -60%, 0%, 0%; }
        }

        /* 銀色金屬按鈕 */
        .metal-btn {
            position: relative;
            background: 
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0) 0px, rgba(255, 255, 255, 0.05) 1px, rgba(255, 255, 255, 0) 2px),
                linear-gradient(145deg, #f5f5f5 0%, #cfcfcf 45%, #a1a1a1 55%, #7a7a7a 100%);
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.6), inset 0 -2px 3px rgba(0,0,0,0.5), 0 15px 35px rgba(255,255,255,0.1);
            border: 1px solid #999;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        .metal-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(110deg, transparent 0%, transparent 40%, rgba(255, 255, 255, 0.7) 50%, transparent 60%, transparent 100%);
            transition: 0s;
            z-index: 2;
        }

        .group:hover .metal-btn::before {
            left: 150%;
            transition: 0.8s ease-in-out;
        }

        /* 底部導覽列 */
        .category-nav {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 1000;
            background: rgba(15, 15, 15, 0.4);
            padding: 8px;
            border-radius: 50px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-nav.scrolled {
            bottom: 20px;
            background: rgba(10, 10, 10, 0.2);
            transform: translateX(-50%) scale(0.9);
            opacity: 0.5;
        }
        
        .category-nav.scrolled:hover {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            background: rgba(15, 15, 15, 0.6);
        }

        .nav-item {
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 13px;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: all 0.4s ease;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-item:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* 背景發光 */
        .bg-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 120vw; height: 120vw; max-width: 1200px;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.25) 0%, rgba(243, 229, 171, 0.15) 25%, rgba(243, 229, 171, 0.05) 50%, transparent 70%);
            z-index: 0; pointer-events: none; animation: pulse-glow 10s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        .play-btn-pulse::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2); animation: ring 2.5s infinite;
        }

        @keyframes ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* 作品集輪播區 */
        .slider-section { 
            height: 100vh; 
            width: 100%; 
            position: relative; 
            background: #000; 
            overflow: hidden; 
            padding-bottom: 100px;
        }
        
        .slide-container {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 提示滑動的抖動動畫 */
        @keyframes swipe-hint {
            0% { transform: translateX(0); }
            20% { transform: translateX(-30px); }
            40% { transform: translateX(20px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }

        .hint-anim {
            animation: swipe-hint 1.2s ease-in-out;
        }

        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s; transform: scale(1.05); display: flex; align-items: center; justify-content: center; pointer-events: none;}
        .slide.active { opacity: 1; transform: scale(1); z-index: 10; }
        .slide img { width: 100%; height: 80%; object-fit: contain; }

        /* 導覽按鈕優化 */
        .nav-btn { 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            z-index: 70; 
            color: white; 
            width: 44px; 
            height: 44px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.3s ease; 
            opacity: 0.2; /* 手機版非常淡 */
            background: transparent;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .nav-btn { 
                opacity: 1;
                width: 55px; 
                height: 55px; 
                background: rgba(255,255,255,0.03); 
                backdrop-filter: blur(15px); 
                border: 1px solid rgba(255,255,255,0.1); 
                border-radius: 50%;
            }
            .nav-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-50%) scale(1.1); }
        }

        /* 頁碼與視覺進度條 */
        .page-indicator-wrapper {
            position: absolute;
            bottom: 45px;
            left: 30px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .page-indicator {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.2em;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .swipe-text {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }

        @media (min-width: 768px) {
            .swipe-text { display: none; }
        }

        .progress-bar-bg {
            width: 100px;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 14.28%; /* 1/7 */
            background: linear-gradient(90deg, #b8a99a, #fff);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .frame-ui { position: fixed; inset: 20px; border: 1px solid rgba(255,255,255,0.03); pointer-events: none; z-index: 100; }

        /* 隱形的點擊區域保持較大 */
        .click-zone {
            position: absolute;
            top: 0;
            height: 100%;
            width: 40%;
            z-index: 60;
        }
        .click-zone-left { left: 0; }
        .click-zone-right { right: 0; }
    </style>
</head>
<body>

    <div class="frame-ui"></div>

    <!-- 底部導覽列 -->
    <nav class="category-nav" id="main-nav">
        <a onclick="document.getElementById('works-slider').scrollIntoView({behavior: 'smooth'})" class="nav-item">關於我</a>
        <a href="https://youtu.be/YLsqzahcr3g" target="_blank" class="nav-item">美髮商業</a>
        <a href="food.html" class="nav-item">美食影像</a>
        <a href="wedding.html" class="nav-item">婚禮攝影</a>
    </nav>

    <!-- 首頁區塊 -->
    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="bg-glow"></div>
        
        <div class="z-10 text-center px-4">
            <div class="mb-8">
                <div class="tracking-[0.5em] text-[9px] md:text-xs text-gray-500 font-light opacity-80 uppercase">
                    Visual Paranoia & Logic Engineering
                </div>
            </div>

            <div class="relative inline-block mb-12 group">
                <a href="https://www.youtube.com/watch?v=R8OsDnJ_6wI" target="_blank" class="play-btn-pulse relative w-32 h-32 md:w-44 md:h-44 bg-white/5 backdrop-blur-md border border-white/10 rounded-full flex items-center justify-center transition-all duration-700 group-hover:bg-white/10 cursor-pointer outline-none">
                    <div class="metal-btn w-24 h-24 md:w-32 md:h-32 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-play text-black/80 text-3xl md:text-5xl translate-x-1 relative z-10"></i>
                    </div>
                </a>
            </div>

            <h1 class="text-5xl md:text-[7.5rem] font-bold tracking-tight mb-4 leading-none">
                <span class="titanium-text">PORTFOLIO</span>
            </h1>
            
            <div class="mt-8 flex flex-col items-center gap-6">
                <div class="text-center">
                    <div class="text-xs md:text-base text-white/60 mb-2 tracking-[0.5em]">2026 影像作品精選</div>
                    <div class="text-[9px] tracking-[0.6em] text-white/30 uppercase">Kenny Shen</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 影像輪播區 -->
    <section id="works-slider" class="slider-section">
        <!-- 點擊區域 -->
        <div class="click-zone click-zone-left" onclick="changeSlide(-1)"></div>
        <div class="click-zone click-zone-right" onclick="changeSlide(1)"></div>

        <!-- 箭頭按鈕：手機版現在是半透明且無背景的細小箭頭 -->
        <button class="nav-btn left-4 md:left-12" onclick="changeSlide(-1)"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="nav-btn right-4 md:right-12" onclick="changeSlide(1)"><i class="fa-solid fa-chevron-right"></i></button>

        <div id="slide-container" class="slide-container">
            <div class="slide active"><img src="Photo-01.jpg" alt="Work 01" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=Photo-01'"></div>
            <div class="slide"><img src="Photo-02.jpg" alt="Work 02" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=Photo-02'"></div>
            <div class="slide"><img src="Photo-03.jpg" alt="Work 03" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=Photo-03'"></div>
            <div class="slide"><img src="Photo-04.jpg" alt="Work 04" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=Photo-04'"></div>
            <div class="slide"><img src="Photo-05.jpg" alt="Work 05" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=Photo-05'"></div>
            <div class="slide"><img src="Photo-06.jpg" alt="Work 06" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=Photo-06'"></div>
            <div class="slide"><img src="Photo-07.jpg" alt="Work 07" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=Photo-07'"></div>
        </div>

        <!-- 頁碼與進度條 -->
        <div class="page-indicator-wrapper">
            <div class="page-indicator">
                <span><span id="current-page">01</span> / 07</span>
                <span class="swipe-text">Slide to view</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill"></div>
            </div>
        </div>
    </section>

    <script>
        let currentSlide = 0;
        const totalSlides = 7;
        const slides = document.querySelectorAll('.slide');
        const pageDisplay = document.getElementById('current-page');
        const progressFill = document.getElementById('progress-fill');
        const nav = document.getElementById('main-nav');
        const slider = document.getElementById('works-slider');
        const slideContainer = document.getElementById('slide-container');

        // 滾動監聽
        let hinted = false;
        window.addEventListener('scroll', () => {
            const rect = slider.getBoundingClientRect();
            
            if (rect.top < window.innerHeight * 0.7 && !hinted) {
                slideContainer.classList.add('hint-anim');
                hinted = true;
                setTimeout(() => slideContainer.classList.remove('hint-anim'), 1200);
            }

            if (window.scrollY > window.innerHeight * 0.5) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // 切換邏輯
        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            
            // 更新 UI
            pageDisplay.innerText = (currentSlide + 1).toString().padStart(2, '0');
            const progress = ((currentSlide + 1) / totalSlides) * 100;
            progressFill.style.width = `${progress}%`;
        }

        // 鍵盤控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        // 滑動手勢
        let touchStartX = 0;
        let touchEndX = 0;

        slider.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        slider.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) changeSlide(1); 
            if (touchEndX > touchStartX + 50) changeSlide(-1);
        }, {passive: true});
    </script>
</body>
</html>
