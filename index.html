<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENNY SHEN | SHOWREEL 2026</title>
    <!-- 引入字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&family=Noto+Sans+TC:wght@300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* 琥珀金漸層 */
        .gold-text {
            background: linear-gradient(135deg, #D4AF37 0%, #F4D03F 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 背景光暈動畫 */
        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            z-index: 0;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        /* 播放按鈕脈衝效果 */
        .play-btn-pulse {
            position: relative;
        }
        .play-btn-pulse::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #D4AF37;
            animation: ring 2s infinite;
        }

        @keyframes ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .hover-scale {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .hover-scale:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        /* 全屏首頁 */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 下滑指示器 */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            opacity: 0.6;
            animation: bounce 2s infinite;
            cursor: pointer;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }
    </style>
</head>
<body>

    <!-- 第一部分：啟動入口 -->
    <section class="hero">
        <div class="bg-glow"></div>
        <div class="z-10 text-center px-4">
            <div class="mb-8 tracking-[0.5em] text-sm md:text-base text-gray-400 font-light opacity-80 uppercase">
                Visual Paranoia & Logic Engineering
            </div>

            <!-- 播放按鈕：直接跳轉 YouTube -->
            <a href="https://www.youtube.com/watch?v=R8OsDnJ_6wI" target="_blank" class="play-btn-pulse inline-block mb-12 group outline-none">
                <div class="w-32 h-32 md:w-48 md:h-48 bg-white/5 backdrop-blur-sm border border-white/20 rounded-full flex items-center justify-center hover-scale group-hover:bg-gold-500/20">
                    <div class="w-24 h-24 md:w-36 md:h-36 bg-[#D4AF37] rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(212,175,55,0.4)]">
                        <i class="fa-solid fa-play text-black text-4xl md:text-6xl translate-x-1"></i>
                    </div>
                </div>
            </a>

            <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-4">
                SHOW<span class="gold-text">REEL</span>
            </h1>
            
            <div class="text-xl md:text-2xl font-light tracking-[0.3em] text-white/90 mb-12">
                2026 影像作品精選
            </div>
        </div>

        <div class="scroll-hint text-[#D4AF37]" onclick="document.getElementById('details').scrollIntoView()">
            <span class="text-xs tracking-widest uppercase block mb-2">View Portfolio</span>
            <i class="fa-solid fa-chevron-down"></i>
        </div>
    </section>

    <!-- 第二部分：嵌入詳細作品頁 -->
    <section id="details" class="bg-[#0a0a0a] py-20 min-h-screen">
        <div class="max-w-7xl mx-auto px-4">
            <h2 class="text-3xl font-bold mb-10 border-l-4 border-[#D4AF37] pl-6 uppercase tracking-wider">
                Detailed <span class="gold-text">Works</span>
            </h2>
            
            <!-- 使用 Iframe 嵌入詳細頁面 -->
            <div class="rounded-xl overflow-hidden border border-white/10 bg-black shadow-2xl">
                <iframe src="kenny_portfolio.html" class="w-full h-[85vh]" frameborder="0"></iframe>
            </div>

            <!-- 底部頁尾 -->
            <footer class="mt-20 pt-10 border-t border-white/5 text-center">
                <div class="text-gray-500 tracking-[0.3em] text-sm uppercase mb-6">Kenny Shen | 沈思諺</div>
                <div class="flex justify-center gap-8 text-2xl text-gray-400">
                    <a href="mailto:yenhengphoto@gmail.com" class="hover:text-[#D4AF37] transition-colors"><i class="fa-solid fa-envelope"></i></a>
                    <a href="https://www.instagram.com/yenheng_photo" target="_blank" class="hover:text-[#D4AF37] transition-colors"><i class="fa-brands fa-instagram"></i></a>
                </div>
                <div class="mt-8 text-[10px] text-gray-700 uppercase tracking-widest">© 2026 All Rights Reserved.</div>
            </footer>
        </div>
    </section>

    <!-- 裝飾邊框 -->
    <div class="fixed inset-8 border border-white/5 pointer-events-none z-50"></div>
</body>
</html>
