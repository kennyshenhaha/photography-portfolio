<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENNY SHEN | SHOWREEL 2026</title>
    <!-- 引入字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&family=Noto+Sans+TC:wght@300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .gold-text {
            background: linear-gradient(135deg, #D4AF37 0%, #F4D03F 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 金屬拉絲質感按鈕 */
        .metal-btn {
            position: relative;
            background: 
                /* 1. 拉絲紋理層 (模擬細微水平線) */
                repeating-linear-gradient(
                    0deg,
                    rgba(255, 255, 255, 0) 0px,
                    rgba(255, 255, 255, 0.03) 1px,
                    rgba(255, 255, 255, 0) 2px
                ),
                /* 2. 金屬漸變層 */
                linear-gradient(145deg, #f5d76e 0%, #d4af37 45%, #b8860b 55%, #8a6d3b 100%);
            box-shadow: 
                inset 0 2px 3px rgba(255,255,255,0.4),
                inset 0 -2px 3px rgba(0,0,0,0.4),
                0 10px 30px rgba(212,175,55,0.3);
            border: 2px solid #9a7b2c;
            overflow: hidden;
        }

        /* 光澤流動效果 */
        .metal-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            transition: 0.6s;
        }

        .metal-btn:hover::before {
            left: 150%;
        }

        /* 第一屏背景發光 */
        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            max-width: 600px;
            max-height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            z-index: 0;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        .play-btn-pulse::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(212, 175, 55, 0.5);
            animation: ring 2s infinite;
        }

        @keyframes ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* 輪播容器樣式 */
        .slider-section {
            height: 100vh;
            width: 100%;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            transform: scale(1.05) translateZ(0);
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: opacity, transform;
        }

        .slide.active {
            opacity: 1;
            transform: scale(1) translateZ(0);
            z-index: 10;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            transition: opacity 0.5s ease;
        }

        /* 載入中動畫 */
        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #D4AF37;
            font-size: 2.5rem;
            z-index: 50;
            animation: spin 1s infinite linear;
            pointer-events: none;
            display: none;
        }

        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 控制按鈕 */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 60;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .nav-btn:hover { background: #D4AF37; color: #000; }
        .prev-btn { left: 40px; }
        .next-btn { right: 40px; }

        /* 裝飾框 */
        .frame-ui {
            position: fixed;
            inset: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="frame-ui"></div>

    <!-- 第一部分：啟動入口 -->
    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="bg-glow"></div>
        <div class="z-10 text-center px-4">
            <div class="mb-8 tracking-[0.5em] text-xs md:text-sm text-gray-400 font-light opacity-80 uppercase">
                Visual Paranoia & Logic Engineering
            </div>

            <a href="https://www.youtube.com/watch?v=R8OsDnJ_6wI" target="_blank" class="play-btn-pulse relative inline-block mb-12 group outline-none">
                <div class="w-32 h-32 md:w-48 md:h-48 bg-white/5 backdrop-blur-sm border border-white/20 rounded-full flex items-center justify-center transition-all duration-500 group-hover:bg-white/10">
                    <!-- 改用 metal-btn 類別 -->
                    <div class="metal-btn w-24 h-24 md:w-36 md:h-36 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-play text-black/80 text-4xl md:text-6xl translate-x-1 drop-shadow-sm"></i>
                    </div>
                </div>
            </a>

            <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-4">
                SHOW<span class="gold-text">REEL</span>
            </h1>
            
            <div class="text-lg md:text-2xl font-light tracking-[0.3em] text-white/90 mb-12">
                2026 影像作品精選
            </div>
        </div>

        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 text-center opacity-60 animate-bounce cursor-pointer" onclick="document.getElementById('works-slider').scrollIntoView()">
            <span class="text-[10px] tracking-[0.3em] uppercase block mb-2 text-[#D4AF37]">Scroll to Works</span>
            <i class="fa-solid fa-chevron-down text-[#D4AF37]"></i>
        </div>
    </section>

    <!-- 第二部分：輪播播放器 -->
    <section id="works-slider" class="slider-section">
        <div id="global-spinner" class="loading-spinner"><i class="fa-solid fa-circle-notch"></i></div>

        <!-- Slides -->
        <div class="slide active"><img src="Photo-01.jpg" alt="Work 01"></div>
        <div class="slide"><img src="Photo-02.jpg" alt="Work 02"></div>
        <div class="slide"><img src="Photo-03.jpg" alt="Work 03"></div>
        <div class="slide"><img src="Photo-04.jpg" alt="Work 04"></div>
        <div class="slide"><img src="Photo-05.jpg" alt="Work 05"></div>
        <div class="slide"><img src="Photo-06.jpg" alt="Work 06"></div>
        <div class="slide"><img src="Photo-07.jpg" alt="Work 07"></div>

        <button class="nav-btn prev-btn" onclick="changeSlide(-1)"><i class="fa-solid fa-arrow-left"></i></button>
        <button class="nav-btn next-btn" onclick="changeSlide(1)"><i class="fa-solid fa-arrow-right"></i></button>

        <div class="absolute bottom-8 right-12 z-50 text-[10px] text-gray-500 tracking-[0.3em] uppercase">
            Kenny Shen Portfolio © 2026
        </div>
    </section>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const spinner = document.getElementById('global-spinner');

        function updateSpinner() {
            const activeImg = slides[currentSlide].querySelector('img');
            if (activeImg.complete) {
                spinner.style.display = 'none';
            } else {
                spinner.style.display = 'block';
                activeImg.addEventListener('load', () => {
                    if (slides[currentSlide].querySelector('img') === activeImg) {
                        spinner.style.display = 'none';
                    }
                }, { once: true });
            }
        }

        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            updateSpinner();
        }

        window.addEventListener('load', updateSpinner);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });
    </script>
</body>
</html>
