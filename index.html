<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YENHENG | Photography & Videography</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1, h2 { font-weight: normal; margin-bottom: 20px; }
        
        /* Showreel 影片封面樣式 */
        .showreel { margin-bottom: 50px; }
        .showreel img { max-width: 100%; max-height: 600px; border-radius: 8px; transition: transform 0.3s ease; }
        .showreel img:hover { transform: scale(1.02); /* 滑鼠游標靠近時會微微放大 */ }
        
        /* 攝影作品集網格排版 */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 15px; 
            max-width: 1200px;
            margin: 0 auto;
        }
        .gallery img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>YENHENG Portfolio</h1>

    <section class="showreel">
        <h2>My Showreel</h2>
        <p style="color: #888; font-size: 0.9em;">點擊圖片觀看完整影片</p>
        <a href="https://www.youtube.com/watch?v=R8OsDnJ_6wI" target="_blank">
            <img src="showreel-cover.jpg" alt="Showreel Cover">
        </a>
    </section>

    <section>
        <h2>Photography</h2>
        <div class="gallery">
            <img src="photo1.jpg" alt="Work 1">
            <img src="photo2.jpg" alt="Work 2">
            <img src="photo3.jpg" alt="Work 3">
            <img src="photo4.jpg" alt="Work 4">
        </div>
    </section>
</body>
</html>
