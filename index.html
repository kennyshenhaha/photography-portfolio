<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENNY SHEN | PORTFOLIO 2026</title>
    <!-- 引入字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&family=Noto+Sans+TC:wght@100;300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* 鈦金掃光文字核心樣式 */
        .titanium-text {
            position: relative;
            display: inline-block;
            background: 
                linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.8) 50%, transparent 60%),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0) 0px, rgba(255, 255, 255, 0.05) 1px, rgba(255, 255, 255, 0) 2px),
                linear-gradient(135deg, #f3e5ab 0%, #e5e4e2 30%, #b8a99a 50%, #d1c4b2 70%, #a89f91 100%);
            background-size: 200% 100%, 100% 100%, 100% 100%;
            background-position-x: 120%, 0%, 0%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.3));
            letter-spacing: -0.02em;
            animation: shine-sweep 5s infinite linear;
        }

        @keyframes shine-sweep {
            0% { background-position-x: 160%, 0%, 0%; }
            25% { background-position-x: -60%, 0%, 0%; }
            100% { background-position-x: -60%, 0%, 0%; }
        }

        /* 銀色金屬按鈕 */
        .metal-btn {
            position: relative;
            background: 
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0) 0px, rgba(255, 255, 255, 0.05) 1px, rgba(255, 255, 255, 0) 2px),
                linear-gradient(145deg, #f5f5f5 0%, #cfcfcf 45%, #a1a1a1 55%, #7a7a7a 100%);
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.6), inset 0 -2px 3px rgba(0,0,0,0.5), 0 15px 35px rgba(255,255,255,0.1);
            border: 1px solid #999;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        /* 底部導覽列 */
        .category-nav {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 1000;
            background: rgba(15, 15, 15, 0.4);
            padding: 8px;
            border-radius: 50px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s ease;
        }

        .category-nav.scrolled {
            bottom: 20px;
            transform: translateX(-50%) scale(0.9);
            opacity: 0.8; 
        }

        .nav-item {
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateY(-2px);
        }

        /* 手機版導覽列縮小設定 */
        @media (max-width: 768px) {
            .category-nav {
                gap: 6px;
                padding: 5px;
                bottom: 25px;
            }
            .category-nav.scrolled {
                bottom: 12px;
            }
            .nav-item {
                padding: 6px 14px;
                font-size: 11px;
            }
        }

        /* 背景發光 */
        .bg-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 120vw; height: 120vw; max-width: 1200px;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.2) 0%, rgba(243, 229, 171, 0.1) 25%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        /* 作品集輪播區 */
        .slider-section { 
            height: 100vh; 
            width: 100%; 
            position: relative; 
            background: #000; 
            overflow: hidden; 
        }
        
        .slide-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide { 
            position: absolute; inset: 0; opacity: 0; 
            transition: opacity 0.8s ease; 
            display: flex; align-items: center; justify-content: center; pointer-events: none;
        }
        .slide.active { opacity: 1; z-index: 10; }
        
        /* 關鍵修正：讓 img 的 DOM 邊界與圖片真實可視邊界完全重合，方便 JS 追蹤座標 */
        .slide img { 
            max-width: 100%; 
            max-height: 75vh; 
            width: auto; 
            height: auto; 
            object-fit: contain; 
        }

        /* Reels 頂部分段進度條 */
        .reels-progress-bar {
            position: absolute;
            top: 20px; /* 預設位置，手機直式時會由 JS 接管覆蓋 */
            left: 20px;
            right: 20px;
            display: flex;
            gap: 6px;
            z-index: 80;
            transition: top 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); /* 新增高度位移過渡動畫 */
        }

        .progress-seg {
            height: 2px;
            flex: 1;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-seg-fill {
            position: absolute;
            top: 0; left: 0; height: 100%;
            width: 0%;
            background: #fff;
            transition: width 0.1s linear;
        }

        /* 隱形點擊區域 (手機端使用) */
        .tap-zone {
            position: absolute;
            top: 0; bottom: 0;
            width: 30%;
            z-index: 100;
            cursor: pointer;
        }
        .tap-left { left: 0; }
        .tap-right { right: 0; }

        /* 電腦版半透明箭頭 */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            z-index: 110;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .nav-arrow:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateY(-50%) scale(1.1);
        }
        .arrow-left { left: 30px; }
        .arrow-right { right: 30px; }

        /* 頁面外框 */
        .frame-ui { position: fixed; inset: 20px; border: 1px solid rgba(255,255,255,0.03); pointer-events: none; z-index: 100; }

        .play-btn-pulse::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2); animation: ring 2.5s infinite;
        }
        @keyframes ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="frame-ui"></div>

    <!-- 底部導覽列 -->
    <nav class="category-nav" id="main-nav">
        <a onclick="document.getElementById('works-slider').scrollIntoView({behavior: 'smooth'})" class="nav-item">關於我</a>
        <a href="https://youtu.be/YLsqzahcr3g" target="_blank" class="nav-item">美髮商業</a>
        <a href="food.html" class="nav-item">美食影像</a>
        <a href="wedding.html" class="nav-item">婚禮攝影</a>
    </nav>

    <!-- 首頁區塊 -->
    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="bg-glow"></div>
        
        <div class="z-10 text-center px-4">
            <div class="mb-8">
                <div class="tracking-[0.5em] text-[9px] md:text-xs text-gray-500 font-light opacity-80 uppercase">
                    Visual Paranoia & Logic Engineering
                </div>
            </div>

            <div class="relative inline-block mb-12 group">
                <a href="https://www.youtube.com/watch?v=R8OsDnJ_6wI" target="_blank" class="play-btn-pulse relative w-32 h-32 md:w-44 md:h-44 bg-white/5 backdrop-blur-md border border-white/10 rounded-full flex items-center justify-center transition-all duration-700 group-hover:bg-white/10 cursor-pointer outline-none">
                    <div class="metal-btn w-24 h-24 md:w-32 md:h-32 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-play text-black/80 text-3xl md:text-5xl translate-x-1 relative z-10"></i>
                    </div>
                </a>
            </div>

            <h1 class="text-5xl md:text-[7.5rem] font-bold tracking-tight mb-4 leading-none">
                <span class="titanium-text">PORTFOLIO</span>
            </h1>
            
            <div class="mt-8 flex flex-col items-center gap-6">
                <div class="text-center">
                    <div class="text-xs md:text-base text-white/60 mb-2 tracking-[0.5em]">2026 影像作品精選</div>
                    <div class="text-[9px] tracking-[0.6em] text-white/30 uppercase">Kenny Shen</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 作品集輪播區 (Reels 進度條 + 電腦版箭頭) -->
    <section id="works-slider" class="slider-section">
        <!-- Reels 進度條容器 -->
        <div class="reels-progress-bar" id="reels-progress"></div>

        <!-- 電腦版箭頭 (手機端 hidden, 電腦端 flex) -->
        <div class="nav-arrow arrow-left hidden md:flex" id="arrow-prev">
            <i class="fa-solid fa-chevron-left"></i>
        </div>
        <div class="nav-arrow arrow-right hidden md:flex" id="arrow-next">
            <i class="fa-solid fa-chevron-right"></i>
        </div>

        <!-- 隱形點擊區域 (供手機端及點擊畫面切換使用) -->
        <div class="tap-zone tap-left" id="tap-prev"></div>
        <div class="tap-zone tap-right" id="tap-next"></div>

        <div id="slide-container" class="slide-container">
            <div class="slide active"><img src="Photo-01.jpg" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=COVER+PHOTO'"></div>
            <div class="slide"><img src="Photo-02.jpg" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=Photo-02'"></div>
            <div class="slide"><img src="Photo-03.jpg" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=Photo-03'"></div>
            <div class="slide"><img src="Photo-04.jpg" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=Photo-04'"></div>
            <div class="slide"><img src="Photo-05.jpg" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=Photo-05'"></div>
            <div class="slide"><img src="Photo-06.jpg" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=Photo-06'"></div>
            <div class="slide"><img src="Photo-07.jpg" onerror="this.src='https://via.placeholder.com/1200x800/000/fff?text=Photo-07'"></div>
        </div>
    </section>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        const progressContainer = document.getElementById('reels-progress');
        const slider = document.getElementById('works-slider');
        const nav = document.getElementById('main-nav');
        
        let progress = 0;
        let isPaused = true; 
        let hasStarted = false; 
        const duration = 5000; 
        const interval = 100;
        const step = 100 / (duration / interval);

        // 動態生成進度條段落
        slides.forEach((_, i) => {
            const seg = document.createElement('div');
            seg.className = 'progress-seg';
            seg.innerHTML = `<div class="progress-seg-fill" id="fill-${i}"></div>`;
            progressContainer.appendChild(seg);
        });

        // 核心邏輯：動態計算進度條位置 (讓它貼緊圖片)
        function updateProgressBarPosition() {
            // 只在「手機版」且為「直式(Portrait)」時作動態貼合
            if (window.innerWidth <= 768 && window.innerHeight > window.innerWidth) {
                const activeImg = slides[currentSlide].querySelector('img');
                if (activeImg) {
                    if (!activeImg.complete) {
                        activeImg.onload = updateProgressBarPosition;
                    }
                    const rect = activeImg.getBoundingClientRect();
                    const sliderRect = slider.getBoundingClientRect();
                    
                    // 取得圖片頂部相對 slider 的位置，再往上預留 15px 空隙
                    let newTop = rect.top - sliderRect.top - 15;
                    
                    // 防呆：避免太高飛出畫面
                    newTop = Math.max(20, newTop); 
                    progressContainer.style.top = newTop + 'px';
                }
            } else {
                // 電腦版或手機橫式(Landscape)時，固定在最上方 20px
                progressContainer.style.top = '20px';
            }
        }

        function changeSlide(direction) {
            // 如果是在第一張點擊「下一張」，則啟動自動輪播
            if (!hasStarted && direction > 0) {
                hasStarted = true;
                isPaused = false;
            }

            slides[currentSlide].classList.remove('active');
            
            const oldFill = document.getElementById(`fill-${currentSlide}`);
            if (direction > 0) {
                oldFill.style.width = '100%';
            } else {
                oldFill.style.width = '0%';
            }

            currentSlide = (currentSlide + direction + totalSlides) % totalSlides;
            slides[currentSlide].classList.add('active');
            progress = 0;
            
            // 確保切換後的進度條視覺正確
            document.getElementById(`fill-${currentSlide}`).style.width = '0%';

            // 重新計算進度條位置 (因不同圖片高度可能不同)
            updateProgressBarPosition();

            // 判斷是否回到第一張
            if (currentSlide === 0) {
                isPaused = true;
                hasStarted = false;
                
                // 清空所有進度條
                setTimeout(() => {
                    slides.forEach((_, i) => {
                        const fill = document.getElementById(`fill-${i}`);
                        if(fill) fill.style.width = '0%';
                    });
                }, 200); 
            } else {
                isPaused = false;
                hasStarted = true;
                
                // 如果是從第一張往回切到最後一張，自動補滿前面的進度
                if (direction < 0 && currentSlide === totalSlides - 1) {
                    slides.forEach((_, i) => {
                        const fill = document.getElementById(`fill-${i}`);
                        if (fill && i < currentSlide) fill.style.width = '100%';
                    });
                }
            }
        }

        // 自動播放計時器
        setInterval(() => {
            const rect = slider.getBoundingClientRect();
            const isInView = rect.top < window.innerHeight && rect.bottom > 0;

            if (!isPaused && isInView && hasStarted) {
                progress += step;
                const currentFill = document.getElementById(`fill-${currentSlide}`);
                if (currentFill) currentFill.style.width = `${progress}%`;

                if (progress >= 100) {
                    changeSlide(1);
                }
            }
        }, interval);

        // 交互綁定 (手機隱形區域)
        document.getElementById('tap-prev').addEventListener('click', () => changeSlide(-1));
        document.getElementById('tap-next').addEventListener('click', () => changeSlide(1));

        // 交互綁定 (電腦版箭頭)
        document.getElementById('arrow-prev').addEventListener('click', (e) => {
            e.stopPropagation();
            changeSlide(-1);
        });
        document.getElementById('arrow-next').addEventListener('click', (e) => {
            e.stopPropagation();
            changeSlide(1);
        });

        // 長按暫停 (啟動後才有效)
        slider.addEventListener('touchstart', () => { if(hasStarted) isPaused = true; });
        slider.addEventListener('touchend', () => { if(hasStarted) isPaused = false; });
        slider.addEventListener('mousedown', () => { if(hasStarted) isPaused = true; });
        slider.addEventListener('mouseup', () => { if(hasStarted) isPaused = false; });

        // 滾動導覽列與初始化定位
        window.addEventListener('load', updateProgressBarPosition);
        window.addEventListener('resize', updateProgressBarPosition);
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > 100) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });
    </script>
</body>
</html>
