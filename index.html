<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENNY SHEN | PORTFOLIO 2026</title>
    <!-- 引入字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&family=Noto+Sans+TC:wght@100;300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* 鈦金掃光文字核心樣式 */
        .titanium-text {
            position: relative;
            display: inline-block;
            background: 
                linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.8) 50%, transparent 60%),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0) 0px, rgba(255, 255, 255, 0.05) 1px, rgba(255, 255, 255, 0) 2px),
                linear-gradient(135deg, #f3e5ab 0%, #e5e4e2 30%, #b8a99a 50%, #d1c4b2 70%, #a89f91 100%);
            background-size: 200% 100%, 100% 100%, 100% 100%;
            background-position-x: 120%, 0%, 0%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.3));
            letter-spacing: -0.02em;
            animation: shine-sweep 5s infinite linear;
        }

        @keyframes shine-sweep {
            0% { background-position-x: 160%, 0%, 0%; }
            25% { background-position-x: -60%, 0%, 0%; }
            100% { background-position-x: -60%, 0%, 0%; }
        }

        /* 銀色金屬拉絲質感按鈕 */
        .metal-btn {
            position: relative;
            background: 
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0) 0px, rgba(255, 255, 255, 0.05) 1px, rgba(255, 255, 255, 0) 2px),
                linear-gradient(145deg, #f5f5f5 0%, #cfcfcf 45%, #a1a1a1 55%, #7a7a7a 100%);
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.6), inset 0 -2px 3px rgba(0,0,0,0.5), 0 15px 35px rgba(255,255,255,0.1);
            border: 1px solid #999;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        .metal-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-30deg);
            transition: 0s;
            z-index: 2;
        }

        .group:hover .metal-btn::before {
            left: 150%;
            transition: 0.8s ease-in-out;
        }

        /* 背景發光 */
        .bg-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100vw; height: 100vw; max-width: 900px; max-height: 900px;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.15) 0%, rgba(243, 229, 171, 0.1) 20%, transparent 50%);
            z-index: 0; pointer-events: none; animation: pulse-glow 8s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }

        /* 播放按鈕外圈漣漪 */
        .play-btn-pulse::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2); animation: ring 2.5s infinite;
        }

        @keyframes ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* 指示箭頭樣式 */
        .indicator-arrow {
            position: absolute;
            top: 5px;
            right: -10px;
            width: 24px;
            height: 24px;
            z-index: 20;
            pointer-events: none;
            filter: drop-shadow(0 0 3px rgba(243, 229, 171, 0.5));
            animation: arrow-swivel 6s infinite ease-in-out;
        }

        .indicator-arrow svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: #f3e5ab;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes arrow-swivel {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-15deg) scale(1.05); }
            50% { transform: rotate(15deg) scale(0.95); }
            75% { transform: rotate(-10deg) scale(1.05); }
        }

        /* 引導滾動區塊 - 新增 Hover 狀態 */
        .scroll-trigger { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            cursor: pointer; 
            opacity: 0.4; 
            transition: all 0.5s ease;
            animation: bounce-gentle 2.5s infinite ease-in-out; 
        }

        .scroll-trigger:hover {
            opacity: 1;
            transform: translateY(5px);
        }

        .scroll-trigger span {
            transition: color 0.5s ease;
        }

        .scroll-trigger:hover span {
            color: #f3e5ab; /* 懸停時文字變為鈦金光澤色 */
        }

        .scroll-line { 
            width: 1px; 
            height: 35px; 
            background: rgba(255, 255, 255, 0.1); 
            margin-top: 15px; 
            position: relative; 
            overflow: hidden; 
            transition: all 0.5s ease;
        }

        .scroll-trigger:hover .scroll-line {
            height: 50px; /* 懸停時線條拉長 */
            background: rgba(243, 229, 171, 0.3);
        }

        .scroll-line::after { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(to bottom, transparent, #fff, transparent); 
            animation: line-sweep 2s infinite ease-in-out; 
        }

        .scroll-trigger:hover .scroll-line::after {
            background: linear-gradient(to bottom, transparent, #f3e5ab, transparent);
        }

        @keyframes bounce-gentle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
        @keyframes line-sweep { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

        .slider-section { height: 100vh; width: 100%; position: relative; background: #000; overflow: hidden; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s; transform: scale(1.05); display: flex; align-items: center; justify-content: center; }
        .slide.active { opacity: 1; transform: scale(1); z-index: 10; }
        .slide img { width: 100%; height: 100%; object-fit: contain; }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); z-index: 60; background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: white; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .frame-ui { position: fixed; inset: 25px; border: 1px solid rgba(255,255,255,0.03); pointer-events: none; z-index: 100; }
        .sub-title-ch { font-family: 'Noto Sans TC', sans-serif; font-weight: 100; letter-spacing: 0.6em; text-indent: 0.6em; }
        .name-brand { text-transform: uppercase; font-size: 10px; letter-spacing: 0.6em; color: rgba(255, 255, 255, 0.3); font-weight: 300; margin-bottom: 0.5rem; }
    </style>
</head>
<body>

    <div class="frame-ui"></div>

    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="bg-glow"></div>
        <div class="z-10 text-center px-4 mt-[-2vh]">
            <div class="mb-10">
                <div class="tracking-[0.6em] text-[10px] md:text-xs text-gray-500 font-light opacity-80 uppercase">
                    Visual Paranoia & Logic Engineering
                </div>
            </div>

            <!-- 播放按鈕區：改為直接跳轉 YouTube 網址 -->
            <div class="relative inline-block mb-14 group">
                <div class="indicator-arrow">
                    <svg viewBox="0 0 24 24">
                        <line x1="20" y1="4" x2="6" y2="18"></line>
                        <polyline points="16,18 6,18 6,8"></polyline>
                    </svg>
                </div>
                
                <!-- 使用 a 標籤直接導向 Youtube -->
                <a href="https://www.youtube.com/watch?v=R8OsDnJ_6wI" target="_blank" class="play-btn-pulse relative w-32 h-32 md:w-44 md:h-44 bg-white/5 backdrop-blur-md border border-white/10 rounded-full flex items-center justify-center transition-all duration-700 group-hover:bg-white/10 group-hover:border-white/20 cursor-pointer outline-none decoration-none">
                    <div class="metal-btn w-24 h-24 md:w-32 md:h-32 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-play text-black/80 text-3xl md:text-5xl translate-x-1"></i>
                    </div>
                </a>
            </div>

            <h1 class="text-6xl md:text-[7.5rem] font-bold tracking-tight mb-4 leading-none">
                <span class="titanium-text">PORTFOLIO</span>
            </h1>
            
            <div class="mt-8 flex flex-col items-center gap-6">
                <div class="text-center">
                    <div class="sub-title-ch text-sm md:text-base text-white/60 mb-2">2026 影像作品精選</div>
                    <div class="name-brand">Kenny Shen</div>
                </div>

                <!-- 具備懸停亮起效果的滾動提示 -->
                <div class="scroll-trigger" onclick="document.getElementById('works-slider').scrollIntoView()">
                    <span class="text-[9px] tracking-[0.4em] uppercase block font-medium">Scroll to explore</span>
                    <div class="scroll-line"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- 影像輪播區 -->
    <section id="works-slider" class="slider-section">
        <div class="slide active"><img src="Photo-01.jpg" alt="Work 01"></div>
        <div class="slide"><img src="Photo-02.jpg" alt="Work 02"></div>
        <div class="slide"><img src="Photo-03.jpg" alt="Work 03"></div>
        <div class="slide"><img src="Photo-04.jpg" alt="Work 04"></div>
        <div class="slide"><img src="Photo-05.jpg" alt="Work 05"></div>
        <div class="slide"><img src="Photo-06.jpg" alt="Work 06"></div>
        <div class="slide"><img src="Photo-07.jpg" alt="Work 07"></div>

        <button class="nav-btn prev-btn left-12" onclick="changeSlide(-1)"><i class="fa-solid fa-arrow-left"></i></button>
        <button class="nav-btn next-btn right-12" onclick="changeSlide(1)"><i class="fa-solid fa-arrow-right"></i></button>

        <div class="absolute bottom-10 left-12 z-50 text-[10px] text-white/30 tracking-[0.2em]">
            <span id="current-page">01</span> / 07
        </div>
        <div class="absolute bottom-10 right-12 z-50 text-[10px] text-white/20 tracking-[0.4em] uppercase">
            Kenny Shen Portfolio
        </div>
    </section>

    <script>
        // 輪播控制
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const pageDisplay = document.getElementById('current-page');

        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            pageDisplay.innerText = (currentSlide + 1).toString().padStart(2, '0');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });
    </script>
</body>
</html>
