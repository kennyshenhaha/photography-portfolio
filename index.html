<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENNY SHEN | PORTFOLIO 2026</title>
    <!-- 引入字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&family=Noto+Sans+TC:wght@100;300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* 鈦金掃光文字核心樣式 */
        .titanium-text {
            position: relative;
            display: inline-block;
            background: 
                linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.8) 50%, transparent 60%),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0) 0px, rgba(255, 255, 255, 0.05) 1px, rgba(255, 255, 255, 0) 2px),
                linear-gradient(135deg, #f3e5ab 0%, #e5e4e2 30%, #b8a99a 50%, #d1c4b2 70%, #a89f91 100%);
            background-size: 200% 100%, 100% 100%, 100% 100%;
            background-position-x: 120%, 0%, 0%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.3));
            letter-spacing: -0.02em;
            animation: shine-sweep 5s infinite linear;
        }

        @keyframes shine-sweep {
            0% { background-position-x: 160%, 0%, 0%; }
            25% { background-position-x: -60%, 0%, 0%; }
            100% { background-position-x: -60%, 0%, 0%; }
        }

        /* 銀色金屬拉絲質感按鈕 + 掃光效果 */
        .metal-btn {
            position: relative;
            background: 
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0) 0px, rgba(255, 255, 255, 0.05) 1px, rgba(255, 255, 255, 0) 2px),
                linear-gradient(145deg, #f5f5f5 0%, #cfcfcf 45%, #a1a1a1 55%, #7a7a7a 100%);
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.6), inset 0 -2px 3px rgba(0,0,0,0.5), 0 15px 35px rgba(255,255,255,0.1);
            border: 1px solid #999;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        /* 掃光層 */
        .metal-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                110deg,
                transparent 0%,
                transparent 40%,
                rgba(255, 255, 255, 0.7) 50%,
                transparent 60%,
                transparent 100%
            );
            transition: 0s;
            z-index: 2;
        }

        /* 滑鼠碰到（group-hover）時觸發掃光 */
        .group:hover .metal-btn::before {
            left: 150%;
            transition: 0.8s ease-in-out;
        }

        /* 底部導覽列樣式 */
        .category-nav {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 50px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .nav-item {
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 13px;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .nav-item:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item.active {
            color: #000;
            background: #f3e5ab; /* 鈦金色為選中狀態 */
            font-weight: 700;
        }

        /* 背景發光 - 強化版本 */
        .bg-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 120vw; height: 120vw; max-width: 1200px;
            background: radial-gradient(
                circle at center, 
                rgba(255, 255, 255, 0.25) 0%, 
                rgba(243, 229, 171, 0.15) 25%, 
                rgba(243, 229, 171, 0.05) 50%, 
                transparent 70%
            );
            z-index: 0; pointer-events: none; animation: pulse-glow 10s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        .play-btn-pulse::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2); animation: ring 2.5s infinite;
        }

        @keyframes ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .slider-section { 
            height: 100vh; 
            width: 100%; 
            position: relative; 
            background: #000; 
            overflow: hidden; 
            /* 修正關鍵：增加捲動邊距防止頂部被遮擋或不對齊 */
            scroll-margin-top: 0;
        }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s; transform: scale(1.05); display: flex; align-items: center; justify-content: center; }
        .slide.active { opacity: 1; transform: scale(1); z-index: 10; }
        .slide img { width: 100%; height: 100%; object-fit: contain; }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); z-index: 60; background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: white; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .nav-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-50%) scale(1.1); }
        
        .frame-ui { position: fixed; inset: 25px; border: 1px solid rgba(255,255,255,0.03); pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <div class="frame-ui"></div>

    <!-- 底部導覽列 -->
    <nav class="category-nav">
        <a onclick="document.getElementById('works-slider').scrollIntoView({behavior: 'smooth'})" class="nav-item">作品集</a>
        <a href="https://youtu.be/YLsqzahcr3g" target="_blank" class="nav-item">美髮商業</a>
        <a href="food.html" class="nav-item">美食影像</a>
        <a href="wedding.html" class="nav-item">婚禮攝影</a>
    </nav>

    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="bg-glow"></div>
        
        <div class="z-10 text-center px-4 mt-[-2vh]">
            <div class="mb-10">
                <div class="tracking-[0.6em] text-[10px] md:text-xs text-gray-500 font-light opacity-80 uppercase">
                    Visual Paranoia & Logic Engineering
                </div>
            </div>

            <!-- 首頁精選影片按鈕 -->
            <div class="relative inline-block mb-14 group">
                <a href="https://www.youtube.com/watch?v=R8OsDnJ_6wI" target="_blank" class="play-btn-pulse relative w-32 h-32 md:w-44 md:h-44 bg-white/5 backdrop-blur-md border border-white/10 rounded-full flex items-center justify-center transition-all duration-700 group-hover:bg-white/10 cursor-pointer outline-none">
                    <div class="metal-btn w-24 h-24 md:w-32 md:h-32 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-play text-black/80 text-3xl md:text-5xl translate-x-1 relative z-10"></i>
                    </div>
                </a>
            </div>

            <h1 class="text-6xl md:text-[7.5rem] font-bold tracking-tight mb-4 leading-none">
                <span class="titanium-text">PORTFOLIO</span>
            </h1>
            
            <div class="mt-8 flex flex-col items-center gap-6">
                <div class="text-center">
                    <div class="text-sm md:text-base text-white/60 mb-2 tracking-[0.6em]">2026 影像作品精選</div>
                    <div class="text-[10px] tracking-[0.6em] text-white/30 uppercase">Kenny Shen</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 影像輪播區 -->
    <section id="works-slider" class="slider-section">
        <div class="slide active"><img src="Photo-01.jpg" alt="Work 01"></div>
        <div class="slide"><img src="Photo-02.jpg" alt="Work 02"></div>
        <div class="slide"><img src="Photo-03.jpg" alt="Work 03"></div>
        <div class="slide"><img src="Photo-04.jpg" alt="Work 04"></div>
        <div class="slide"><img src="Photo-05.jpg" alt="Work 05"></div>
        <div class="slide"><img src="Photo-06.jpg" alt="Work 06"></div>
        <div class="slide"><img src="Photo-07.jpg" alt="Work 07"></div>

        <button class="nav-btn prev-btn left-12" onclick="changeSlide(-1)"><i class="fa-solid fa-arrow-left"></i></button>
        <button class="nav-btn next-btn right-12" onclick="changeSlide(1)"><i class="fa-solid fa-arrow-right"></i></button>

        <div class="absolute bottom-10 left-12 z-50 text-[10px] text-white/30 tracking-[0.2em]">
            <span id="current-page">01</span> / 07
        </div>
    </section>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const pageDisplay = document.getElementById('current-page');

        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            pageDisplay.innerText = (currentSlide + 1).toString().padStart(2, '0');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });
    </script>
</body>
</html>
