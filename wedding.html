<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENNY SHEN | WEDDING PHOTOGRAPHY</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&family=Noto+Sans+TC:wght@100;300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
        }

        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(255, 230, 210, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        .container-custom {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* 核心排版：非對稱網格系統 */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 手機版 2 欄 */
            gap: 8px;
            grid-auto-flow: dense; /* 自動填補空隙 */
        }

        @media (min-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(4, 1fr); /* 電腦版 4 欄 */
                gap: 16px;
            }
        }

        .wedding-item {
            position: relative;
            overflow: hidden;
            background: #111;
            transition: all 0.5s ease;
        }

        /* 設定特定編號的照片大小，模擬截圖中的層次感 */
        /* 大正方形或橫向照片 */
        .item-lg { grid-column: span 2; grid-row: span 2; } 
        .item-wide { grid-column: span 2; }
        .item-tall { grid-row: span 2; }

        @media (max-width: 768px) {
            /* 手機版縮小間距與調整跨度 */
            .item-lg { grid-column: span 2; grid-row: span 2; }
            .item-wide { grid-column: span 2; }
        }

        .wedding-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 1.2s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .wedding-item:hover img {
            transform: scale(1.05);
        }
        /* 針對 Wedding 27 的裁切微調：靠左顯示 */
        .img-27 {
            object-position: left center !important;
        /* 底部導覽列 */
        .category-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 1000;
            background: rgba(15, 15, 15, 0.8); padding: 6px; border-radius: 50px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-item {
            padding: 10px 24px; border-radius: 40px; font-size: 13px;
            letter-spacing: 0.1em; color: rgba(255,255,255,0.6);
            text-decoration: none; transition: all 0.3s ease;
            white-space: nowrap;
        }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.1); }

        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade-in { animation: fadeInUp 1s ease forwards; }

        /* 圖片載入動畫 */
        .wedding-item { opacity: 0; animation: fadeInUp 0.8s ease forwards; }
    </style>
</head>
<body class="py-10 md:py-20">

    <div class="bg-glow"></div>

    <header class="container-custom mb-12 md:mb-20 animate-fade-in">
        <a href="index.html" class="text-[10px] tracking-[0.4em] text-white/40 hover:text-white transition-colors mb-4 inline-block uppercase">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back to Main
        </a>
        <h1 class="text-4xl md:text-6xl font-bold tracking-tight">
            婚禮攝影 <span class="text-white/20 ml-2 font-light italic text-xl md:text-3xl uppercase">Wedding Moments</span>
        </h1>
    </header>

    <main class="container-custom mb-40">
        <div class="gallery-grid">
            <!-- 運用 item-lg (大), item-wide (寬), item-tall (高) 來重現截圖排版 -->
            
            <div class="wedding-item item-lg" style="animation-delay: 0.1s;"><img src="Wedding-01.jpg" alt="Wedding 01"></div>
            <div class="wedding-item" style="animation-delay: 0.2s;"><img src="Wedding-02.jpg" alt="Wedding 02"></div>

            <div class="wedding-item" style="animation-delay: 0.9s;"><img src="Wedding-21.jpg" alt="Wedding 21"></div>

            <div class="wedding-item" style="animation-delay: 1.2s;"><img src="Wedding-24.jpg" alt="Wedding 24"></div>

            <div class="wedding-item" style="animation-delay: 0.3s;"><img src="Wedding-29.jpg" alt="Wedding 29"></div>
            <div class="wedding-item" style="animation-delay: 0.4s;"><img src="Wedding-28.jpg" alt="Wedding 28"></div>
            
            <div class="wedding-item item-tall" style="animation-delay: 0.5s;"><img src="Wedding-27.jpg" alt="Wedding 27"></div>
            <div class="wedding-item" style="animation-delay: 0.6s;"><img src="Wedding-30.jpg" alt="Wedding 30"></div>
            <div class="wedding-item" style="animation-delay: 0.7s;"><img src="Wedding-32.jpg" alt="Wedding 32"></div>
            <div class="wedding-item item-wide" style="animation-delay: 0.8s;"><img src="Wedding-31.jpg" alt="Wedding 31"></div>
        </div>
    </main>

    <nav class="category-nav">
        <a href="index.html" class="nav-item">回首頁</a>

</body>
