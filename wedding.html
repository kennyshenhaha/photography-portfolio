    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* 輝光背景 */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(255, 230, 210, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        /* 左上角返回鍵 (極簡白箭頭) */
        .back-btn {
            position: fixed; top: 30px; left: 30px; z-index: 100; width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateX(-5px); border-color: rgba(255, 255, 255, 0.3); }

        .container-custom {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* 原有網格排版 (完全保留不動) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 8px;
            grid-auto-flow: dense;
        }

        @media (min-width: 1024px) {
            .gallery-grid {
                gap: 16px;
                max-width: 900px; 
                margin: 0 auto;
            }
        }

        /* 骨架屏載入動畫 */
        .wedding-item {
            position: relative;
            overflow: hidden;
            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite linear;
            transition: all 0.5s ease;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 跨度類別 (完全保留) */
        .item-lg { grid-column: span 2; grid-row: span 2; } 
        .item-wide { grid-column: span 2; }
        .item-tall { grid-row: span 2; }

        /* 圖片載入過渡效果 */
        .wedding-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0; 
            transition: opacity 0.6s ease, transform 1.2s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .wedding-item img.loaded {
            opacity: 1; 
        }

        .img-27 { object-position: 20% center !important; }

        .wedding-item:hover img.loaded {
            transform: scale(1.05);
        }

        #fab-container { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade-in { animation: fadeInUp 1s ease forwards; }
        .wedding-item-anim { opacity: 0; animation: fadeInUp 0.8s ease forwards; }
        
        #lightbox { transition: opacity 0.3s ease; overscroll-behavior: contain; touch-action: none; }
        #lightbox-img { transition: opacity 0.2s ease, transform 0.3s cubic-bezier(0.165, 0.84, 0.44, 1); }

        /* ================= 折疊選單 (Accordion) 特效 ================= */
        .accordion-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .accordion-content.is-open { grid-template-rows: 1fr; }
        .accordion-inner { overflow: hidden; }

        /* 強制選單區塊使用思源黑體 */
        #bottom-sheet { font-family: 'Noto Sans TC', sans-serif; }
    </style>

                                <a href="https://photos.google.com/share/AF1QipOcqOXF-cWqF4ASgcmQkWf2sZieUTP7I8cJAiC6oycsSuxs85urrxEGt_gHnFftbQ?pli=1&key=WFd6U0Q3ckV4Ylh2STl6Ty1iaVBZV2VSNGh2ZGVB" target="_blank" class="flex items-center justify-between p-3 rounded-xl hover:bg-white/10 transition-colors group">
                                    <div class="flex items-center gap-3">
                                        <i class="fa-solid fa-user-astronaut text-[#0ea5e9]/70 text-sm w-5 text-center"></i>
                                        <span class="text-sm font-medium text-white/80 group-hover:text-white transition-colors">人像創作</span>
                                    </div>
                                    <i class="fa-solid fa-arrow-right text-white/30 text-xs group-hover:text-white group-hover:translate-x-1 transition-all"></i>
                                </a>
                                <a href="food.html" class="flex items-center justify-between p-3 rounded-xl hover:bg-white/10 transition-colors group">
                                    <div class="flex items-center gap-3">
                                        <i class="fa-solid fa-utensils text-[#2563eb]/70 text-sm w-5 text-center"></i>
                                        <span class="text-sm font-medium text-white/80 group-hover:text-white transition-colors">美食影像</span>
                                    </div>
                                    <i class="fa-solid fa-arrow-right text-white/30 text-xs group-hover:text-white group-hover:translate-x-1 transition-all"></i>
                                </a>
                                <!-- 目前所在的頁面 (婚禮攝影) 標示高光 -->
                                <a href="wedding.html" class="flex items-center justify-between p-3 rounded-xl bg-white/5 hover:bg-white/10 transition-colors group">
                                    <div class="flex items-center gap-3">
                                        <i class="fa-solid fa-ring text-[#3730a3] text-sm w-5 text-center"></i>
                                        <span class="text-sm font-bold text-white transition-colors">婚禮攝影</span>
                                    </div>
                                    <div class="w-1.5 h-1.5 rounded-full bg-[#3730a3] mr-1"></div>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ================= Lightbox 升級邏輯 =================
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('lightbox-close');
        const prevBtn = document.getElementById('lightbox-prev');
        const nextBtn = document.getElementById('lightbox-next');
        const weddingItems = document.querySelectorAll('.wedding-item');
        
        let currentImgIndex = 0;
        const imgSources = Array.from(weddingItems).map(item => item.querySelector('img').src);

        function updateLightboxImage() {
            lightboxImg.style.opacity = '0'; 
            setTimeout(() => {
                lightboxImg.src = imgSources[currentImgIndex];
                lightboxImg.onload = () => {
                    lightboxImg.style.opacity = '1'; 
                };
            }, 200);
        }

        weddingItems.forEach((item, index) => {
            item.addEventListener('click', () => {
                currentImgIndex = index;
                lightboxImg.src = imgSources[currentImgIndex];
                
                lightbox.classList.remove('hidden');
                lightbox.classList.add('flex');
                
                requestAnimationFrame(() => {
                    lightbox.classList.remove('opacity-0');
                    lightboxImg.classList.remove('scale-95');
                    lightboxImg.classList.add('scale-100');
                    lightboxImg.style.opacity = '1';
                });
            });
        });

        const closeLightbox = () => {
            lightbox.classList.add('opacity-0');
            lightboxImg.classList.remove('scale-100');
            lightboxImg.classList.add('scale-95');
            
            setTimeout(() => {
                lightbox.classList.add('hidden');
                lightbox.classList.remove('flex');
                lightboxImg.src = '';
            }, 300);
        };

        const showPrev = (e) => { if(e) e.stopPropagation(); currentImgIndex = (currentImgIndex - 1 + imgSources.length) % imgSources.length; updateLightboxImage(); };
        const showNext = (e) => { if(e) e.stopPropagation(); currentImgIndex = (currentImgIndex + 1) % imgSources.length; updateLightboxImage(); };

        closeBtn.addEventListener('click', closeLightbox);
        prevBtn.addEventListener('click', showPrev);
        nextBtn.addEventListener('click', showNext);
        
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('hidden')) {
                if (e.key === 'Escape') closeLightbox();
                else if (e.key === 'ArrowLeft') showPrev();
                else if (e.key === 'ArrowRight') showNext();
            }
        });

        // 手機版滑動支援
        let touchStartX = 0;
        let touchStartY = 0;

        lightbox.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        lightbox.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const deltaX = touchStartX - touchEndX;
            const deltaY = touchStartY - touchEndY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 50) showNext(); 
                else if (deltaX < -50) showPrev(); 
            } else {
                if (deltaY < -60) closeLightbox(); 
            }
        }, {passive: true});

        // ================= 折疊選單 (Accordion) 邏輯 =================
        document.querySelectorAll('.accordion-toggle').forEach(button => {
            button.addEventListener('click', () => {
                const group = button.closest('.accordion-group');
                const content = group.querySelector('.accordion-content');
                const icon = group.querySelector('.accordion-icon');
                const isOpen = content.classList.contains('is-open');
                
                document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('is-open'));
                document.querySelectorAll('.accordion-icon').forEach(i => i.classList.remove('rotate-180'));
                document.querySelectorAll('.accordion-group').forEach(g => g.classList.remove('bg-white/5'));

                if (!isOpen) {
                    content.classList.add('is-open');
                    icon.classList.add('rotate-180');
                    group.classList.add('bg-white/5');
                }
            });
        });

        // ================= 底部滑動選單邏輯 =================
        const fabContainer = document.getElementById('fab-container');
        const fabMenu = document.getElementById('fab-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const bottomSheet = document.getElementById('bottom-sheet');
        const dragHandle = document.getElementById('drag-handle');

        function openMenu() {
            menuOverlay.classList.remove('opacity-0', 'pointer-events-none');
            bottomSheet.classList.remove('translate-y-full');
            fabContainer.classList.add('translate-y-12', 'opacity-0', 'pointer-events-none'); 
            document.body.style.overflow = 'hidden'; 

            // 自動展開「平面作品」選單 (因為我們在婚禮攝影頁面)
            setTimeout(() => {
                const staticGroup = document.querySelectorAll('.accordion-group')[1];
                if(staticGroup && !staticGroup.querySelector('.accordion-content').classList.contains('is-open')) {
                    staticGroup.querySelector('.accordion-toggle').click();
                }
            }, 300);
        }

        function closeMenu() {
            menuOverlay.classList.add('opacity-0', 'pointer-events-none');
            bottomSheet.classList.add('translate-y-full');
            fabContainer.classList.remove('translate-y-12', 'opacity-0', 'pointer-events-none'); 
            document.body.style.overflow = '';
            setFabState('full');
            resetIdleTimer();

            // 關閉選單時，將所有折疊收起
            setTimeout(() => {
                document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('is-open'));
                document.querySelectorAll('.accordion-icon').forEach(i => i.classList.remove('rotate-180'));
            }, 300);
        }

        fabMenu.addEventListener('click', openMenu);
        menuOverlay.addEventListener('click', closeMenu);
        dragHandle.addEventListener('click', closeMenu);

        let menuTouchStartY = 0;
        bottomSheet.addEventListener('touchstart', (e) => {
            if(e.target.closest('.overflow-y-auto')) return;
            menuTouchStartY = e.touches[0].clientY;
        });
        bottomSheet.addEventListener('touchmove', (e) => {
            if(e.target.closest('.overflow-y-auto')) return;
            if (e.touches[0].clientY - menuTouchStartY > 60) closeMenu();
        });

        // ================= 進階按鈕顯示邏輯 (閒置消失) =================
        let idleTimer;
        let lastScrollY = window.scrollY;

        function setFabState(state) {
            if (!bottomSheet.classList.contains('translate-y-full')) return;
            
            fabContainer.classList.remove(
                'opacity-100', 'translate-y-0', 'scale-100', 
                'opacity-40', 'translate-y-4', 'scale-90', 
                'opacity-0', 'translate-y-12', 'pointer-events-none'
            );

            if (state === 'full') {
                fabContainer.classList.add('opacity-100', 'translate-y-0', 'scale-100');
            } else if (state === 'semi') {
                fabContainer.classList.add('opacity-40', 'translate-y-4', 'scale-90');
            } else if (state === 'hidden') {
                fabContainer.classList.add('opacity-0', 'translate-y-12', 'scale-90', 'pointer-events-none');
            }
        }

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            if (window.scrollY > window.innerHeight * 0.3) {
                idleTimer = setTimeout(() => {
                    setFabState('hidden');
                }, 1000); 
            }
        }

        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;
            if (currentScrollY > lastScrollY && currentScrollY > 100) {
                setFabState('semi');
            } else {
                setFabState('full');
            }
            lastScrollY = currentScrollY;
            resetIdleTimer();
        }, {passive: true});

        ['touchstart', 'mousemove', 'click'].forEach(event => {
            window.addEventListener(event, () => {
                setFabState('full');
                resetIdleTimer();
            }, {passive: true});
        });

        setFabState('full');
        resetIdleTimer();

        // ================= 回到頂部按鈕邏輯 =================
        const backToTopBtn = document.getElementById('back-to-top');
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTopBtn.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
                backToTopBtn.classList.add('opacity-100', 'translate-y-0');
            } else {
                backToTopBtn.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
                backToTopBtn.classList.remove('opacity-100', 'translate-y-0');
            }
        });

        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ================= 頁面過渡動畫邏輯 =================
        const pageTransition = document.getElementById('page-transition');
        
        function hideTransition() {
            pageTransition.classList.remove('opacity-100');
            pageTransition.classList.add('opacity-0');
        }

        document.addEventListener('DOMContentLoaded', hideTransition);
        window.addEventListener('load', hideTransition);
        window.addEventListener('pageshow', hideTransition);
        setTimeout(hideTransition, 500); 

        document.addEventListener('click', function(e) {
            const anchor = e.target.closest('a');
            if (!anchor) return; 

            const href = anchor.getAttribute('href');
            const target = anchor.getAttribute('target');
            const onclick = anchor.getAttribute('onclick');
            
            if (href && !href.startsWith('#') && !href.startsWith('javascript') && target !== '_blank' && !anchor.hasAttribute('download') && !onclick) {
                e.preventDefault(); 
                pageTransition.classList.remove('opacity-0');
                pageTransition.classList.add('opacity-100');
                
                setTimeout(() => {
                    window.location.href = href;
                }, 400);
            }
        });

    </script>
</body>
</html>
