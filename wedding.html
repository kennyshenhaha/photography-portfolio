<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENNY SHEN | WEDDING PHOTOGRAPHY</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&family=Noto+Sans+TC:wght@100;300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
        }

        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(255, 230, 210, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        .container-custom {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* 統一項目樣式 */
        .wedding-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background: #111;
            transition: all 0.7s cubic-bezier(0.165, 0.84, 0.44, 1);
            width: 100%;
        }

        .wedding-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s ease;
        }

        .wedding-item:hover img {
            transform: scale(1.05);
        }

        /* 裁切點專用修正 */
        .img-03 { object-position: 70% center !important; } /* 03 稍微往右偏 */
        .img-04 { object-position: center 5% !important; } /* 04 往上移，留住新娘頭部 */
        .img-06 { object-position: center 15% !important; } /* 06 往上移，避免裁切 */

        /* 導覽列 */
        .category-nav {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 1000;
            background: rgba(15, 15, 15, 0.6); padding: 8px; border-radius: 50px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-item {
            padding: 10px 24px; border-radius: 40px; font-size: 13px;
            letter-spacing: 0.1em; color: rgba(255,255,255,0.6);
            text-decoration: none; transition: all 0.4s ease;
        }
        .nav-item.active { color: #000; background: #f3e5ab; font-weight: 700; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeInUp 1s ease forwards; }
    </style>
</head>
<body class="py-12 md:py-20">

    <div class="bg-glow"></div>

    <header class="container-custom mb-16 animate-fade-in">
        <a href="index.html" class="text-[10px] tracking-[0.4em] text-white/40 hover:text-white transition-colors mb-4 inline-block uppercase">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back to Main
        </a>
        <h1 class="text-4xl md:text-6xl font-bold tracking-tight mb-4">
            婚禮攝影 <span class="text-white/20 ml-2 font-light italic text-xl md:text-3xl">Wedding Moments</span>
        </h1>
    </header>

    <main class="container-custom flex flex-col gap-6 mb-40 animate-fade-in">
        
        <!-- 第一排：01 大景左 + (02, 04) 右 -->
        <div class="flex flex-col lg:flex-row gap-6">
            <div class="w-full lg:w-2/3">
                <div class="wedding-item aspect-[4/3] lg:aspect-auto lg:h-full">
                    <img src="Wedding-01.jpg" alt="Wedding 01">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent flex flex-col justify-end p-8">
                        <span class="text-[9px] tracking-[0.4em] text-[#f3e5ab] mb-2 uppercase">The Beginning</span>
                        <h3 class="text-xl font-bold">Wedding Project</h3>
                    </div>
                </div>
            </div>
            <div class="w-full lg:w-1/3 flex flex-col gap-6">
                <div class="wedding-item aspect-[16/11]">
                    <img src="Wedding-02.jpg" alt="Wedding 02">
                </div>
                <div class="wedding-item aspect-[16/11]">
                    <img src="Wedding-04.jpg" alt="Wedding 04" class="img-04">
                </div>
            </div>
        </div>

        <!-- 第二排：03 直式左 + (06, 05) 右 -->
        <div class="flex flex-col lg:flex-row gap-6">
            <div class="w-full lg:w-[41.6%]">
                <div class="wedding-item aspect-[3/4] lg:aspect-auto lg:h-full">
                    <img src="Wedding-03.jpg" alt="Wedding 03" class="img-03">
                </div>
            </div>
            <div class="w-full lg:w-[58.4%] flex flex-col gap-6">
                <div class="wedding-item aspect-[16/9]">
                    <img src="Wedding-06.jpg" alt="Wedding 06" class="img-06">
                </div>
                <div class="wedding-item aspect-[16/9]">
                    <img src="Wedding-05.jpg" alt="Wedding 05">
                </div>
            </div>
        </div>

        <!-- 第三排：07, 08, 09 均分 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="wedding-item aspect-square">
                <img src="Wedding-07.jpg" alt="Wedding 07">
            </div>
            <div class="wedding-item aspect-square">
                <img src="Wedding-08.jpg" alt="Wedding 08">
            </div>
            <div class="wedding-item aspect-square">
                <img src="Wedding-09.jpg" alt="Wedding 09">
            </div>
        </div>

    </main>

    <nav class="category-nav">
        <a href="index.html" class="nav-item">精選</a>
        <a href="hair.html" class="nav-item">美髮商業</a>
        <a href="food.html" class="nav-item">美食影像</a>
        <a href="wedding.html" class="nav-item active">婚禮攝影</a>
    </nav>

</body>
</html>
