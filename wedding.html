<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENNY SHEN | WEDDING PHOTOGRAPHY</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&family=Noto+Sans+TC:wght@100;300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(255, 230, 210, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        /* 雜誌感網格系統 */
        .magazine-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr); /* 12欄系統，方便比例分配 */
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 每一項的基礎樣式 */
        .wedding-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background: #111;
            transition: all 0.7s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .wedding-item img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 1.2s ease;
        }

        .wedding-item:hover img { transform: scale(1.08); }

        /* 資訊浮層 */
        .overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
            opacity: 0; transition: opacity 0.5s ease;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 2rem;
        }
        .wedding-item:hover .overlay { opacity: 1; }

        /* 雜誌風格排版佈置 (桌面端) */
        @media (min-width: 1025px) {
            /* 1. 飯店大景 (寬屏開頭) */
            .item-01 { grid-column: span 8; aspect-ratio: 16 / 7; }
            /* 2. 婚戒 (窄長細節) */
            .item-02 { grid-column: span 4; aspect-ratio: 3 / 4; }
            /* 3. 情感時刻 (核心大圖) */
            .item-03 { grid-column: span 6; grid-row: span 2; aspect-ratio: 4 / 5; }
            /* 4. 梳妝 */
            .item-04 { grid-column: span 3; aspect-ratio: 1 / 1; }
            /* 5. 婚鞋 */
            .item-05 { grid-column: span 3; aspect-ratio: 1 / 1; }
            /* 6. 男生整理 (橫向) */
            .item-06 { grid-column: span 6; aspect-ratio: 3 / 2; }
            /* 7. 交手細節 */
            .item-07 { grid-column: span 4; aspect-ratio: 1 / 1; }
            /* 8. 溫馨時刻 */
            .item-08 { grid-column: span 4; aspect-ratio: 1 / 1; }
            /* 9. 大合照 (滿寬結尾) */
            .item-09 { grid-column: span 4; aspect-ratio: 1 / 1; }
        }

        /* 行動端 */
        @media (max-width: 1024px) {
            .magazine-grid { grid-template-columns: 1fr; }
            .wedding-item { aspect-ratio: 3 / 2; margin-bottom: 0.5rem; }
        }

        /* 導覽列 */
        .category-nav {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 1000;
            background: rgba(15, 15, 15, 0.6); padding: 8px; border-radius: 50px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-item {
            padding: 10px 24px; border-radius: 40px; font-size: 13px;
            letter-spacing: 0.1em; color: rgba(255,255,255,0.6);
            text-decoration: none; transition: all 0.4s ease;
        }
        .nav-item:hover { color: #fff; background: rgba(255, 255, 255, 0.1); }
        .nav-item.active { color: #000; background: #f3e5ab; font-weight: 700; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeInUp 1s ease forwards; }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">

    <div class="bg-glow"></div>

    <header class="mb-20 animate-fade-in">
        <a href="index.html" class="text-[10px] tracking-[0.4em] text-white/40 hover:text-white transition-colors mb-4 inline-block uppercase">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back to Main
        </a>
        <h1 class="text-4xl md:text-6xl font-bold tracking-tight mb-4">
            婚禮攝影 <span class="text-white/20 ml-2 font-light italic text-xl md:text-3xl">Wedding Moments</span>
        </h1>
        <p class="text-white/40 text-sm tracking-[0.2em] uppercase">The Art of Storytelling through Light and Love</p>
    </header>

    <main class="magazine-grid mb-40 animate-fade-in" style="animation-delay: 0.2s;">
        
        <!-- 1. 飯店大景 - 故事開場 (佔據寬位) -->
        <div class="wedding-item item-01">
            <img src="20250704-DSC07500.jpg" alt="Wedding Venue">
            <div class="overlay">
                <span class="text-[9px] tracking-[0.4em] text-[#f3e5ab] mb-2 uppercase">The Beginning</span>
                <h3 class="text-xl font-bold">故事的起點</h3>
            </div>
        </div>

        <!-- 2. 婚戒 (窄位) -->
        <div class="wedding-item item-02">
            <img src="20250704-DSC07531.jpg" alt="Rings">
            <div class="overlay"><h3 class="text-lg font-bold">永恆的承諾</h3></div>
        </div>

        <!-- 3. 新人情感大圖 (直式大圖，跨兩行) -->
        <div class="wedding-item item-03">
            <img src="20250704-DSC08260.jpg" alt="Emotional Moment">
            <div class="overlay">
                <span class="text-[9px] tracking-[0.4em] text-[#f3e5ab] mb-2 uppercase">The Vow</span>
                <h3 class="text-2xl font-bold">最美的瞬間</h3>
            </div>
        </div>

        <!-- 4. 梳妝 (正方) -->
        <div class="wedding-item item-04">
            <img src="20250704-DSC07926.jpg" alt="Makeup">
            <div class="overlay"><h3 class="text-sm font-bold">期待</h3></div>
        </div>

        <!-- 5. 婚鞋 (正方) -->
        <div class="wedding-item item-05">
            <img src="20250704-DSC07570.jpg" alt="Shoes">
            <div class="overlay"><h3 class="text-sm font-bold">優雅</h3></div>
        </div>

        <!-- 6. 男生整理 (橫向長圖) -->
        <div class="wedding-item item-06">
            <img src="20250704-DSC07810.jpg" alt="Groom Prep">
            <div class="overlay"><h3 class="text-lg font-bold">紳士細節</h3></div>
        </div>

        <!-- 7. 交手儀式 1 (DSC08053) -->
        <div class="wedding-item item-07">
            <img src="20250704-DSC08053.jpg" alt="Hand over">
            <div class="overlay"><h3 class="text-sm font-bold">交付</h3></div>
        </div>

        <!-- 8. 交手儀式 2 (DSC08493) -->
        <div class="wedding-item item-08">
            <img src="20250704-DSC08493.jpg" alt="Interaction">
            <div class="overlay"><h3 class="text-sm font-bold">溫度</h3></div>
        </div>

        <!-- 9. 結尾大合照 (DSC08754) -->
        <div class="wedding-item item-09">
            <img src="20250704-DSC08754.jpg" alt="Group Photo">
            <div class="overlay"><h3 class="text-sm font-bold">圓滿</h3></div>
        </div>

    </main>

    <nav class="category-nav">
        <a href="index.html" class="nav-item">精選</a>
        <a href="hair.html" class="nav-item">美髮商業</a>
        <a href="food.html" class="nav-item">美食影像</a>
        <a href="wedding.html" class="nav-item active">婚禮攝影</a>
    </nav>

</body>
</html>
