<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENNY SHEN | WEDDING PHOTOGRAPHY</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&family=Noto+Sans+TC:wght@100;300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(255, 230, 210, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        /* 雜誌感網格系統 */
        .magazine-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 每一項的基礎樣式 */
        .wedding-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background: #111;
            transition: all 0.7s cubic-bezier(0.165, 0.84, 0.44, 1);
            width: 100%;
        }

        .wedding-item img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 1.2s ease;
        }

        .wedding-item:hover img { transform: scale(1.08); }

        /* 僅用於 01 的資訊浮層 */
        .overlay-main {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 2rem;
            opacity: 1;
        }

        /* 雜誌風格排版佈置 - 修正對齊邏輯 */
        @media (min-width: 1025px) {
            /* 第一排高度統一由 01 撐開 */
            .row-1-group { grid-column: span 12; display: grid; grid-template-columns: repeat(12, 1fr); gap: 1.5rem; height: 80vh; }
            .item-01 { grid-column: span 8; height: 100%; }
            .side-stack { grid-column: span 4; display: flex; flex-direction: column; gap: 1.5rem; height: 100%; }
            .item-02, .item-04 { height: calc(50% - 0.75rem); }

            /* 第二排高度統一 */
            .row-2-group { grid-column: span 12; display: grid; grid-template-columns: repeat(12, 1fr); gap: 1.5rem; height: 90vh; }
            .item-03 { grid-column: span 5; height: 100%; }
            .side-stack-2 { grid-column: span 7; display: flex; flex-direction: column; gap: 1.5rem; height: 100%; }
            .item-06, .item-05 { height: calc(50% - 0.75rem); }

            /* 第三排：正方形三格 */
            .item-07, .item-08, .item-09 { grid-column: span 4; aspect-ratio: 1 / 1; }
        }

        /* 針對照片細節修正裁切點 */
        .item-03 img { object-position: center; }       /* 03 置中 */
        .item-02 img { object-position: center; }    
        .item-04 img { object-position: center 5%; }    /* 04 往上，確保頭部完整 */
        .item-06 img { object-position: center 20%; } 
        .item-05 img { object-position: center 40%; } 

        /* 行動端 */
        @media (max-width: 1024px) {
            .magazine-grid { grid-template-columns: 1fr; }
            .wedding-item { aspect-ratio: 3 / 2; margin-bottom: 0.5rem; }
            .row-1-group, .row-2-group, .side-stack, .side-stack-2 { display: contents; }
        }

        /* 導覽列 */
        .category-nav {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 1000;
            background: rgba(15, 15, 15, 0.6); padding: 8px; border-radius: 50px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-item {
            padding: 10px 24px; border-radius: 40px; font-size: 13px;
            letter-spacing: 0.1em; color: rgba(255,255,255,0.6);
            text-decoration: none; transition: all 0.4s ease;
        }
        .nav-item:hover { color: #fff; background: rgba(255, 255, 255, 0.1); }
        .nav-item.active { color: #000; background: #f3e5ab; font-weight: 700; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeInUp 1s ease forwards; }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">

    <div class="bg-glow"></div>

    <header class="mb-20 animate-fade-in">
        <a href="index.html" class="text-[10px] tracking-[0.4em] text-white/40 hover:text-white transition-colors mb-4 inline-block uppercase">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back to Main
        </a>
        <h1 class="text-4xl md:text-6xl font-bold tracking-tight mb-4">
            婚禮攝影 <span class="text-white/20 ml-2 font-light italic text-xl md:text-3xl">Wedding Moments</span>
        </h1>
        <p class="text-white/40 text-sm tracking-[0.2em] uppercase">The Art of Storytelling through Light and Love</p>
    </header>

    <main class="magazine-grid mb-40 animate-fade-in" style="animation-delay: 0.2s;">
        
        <!-- 第一排組合：01 大圖與 (02+04) -->
        <div class="row-1-group">
            <div class="wedding-item item-01">
                <img src="Wedding-01.jpg" alt="Wedding Venue">
                <div class="overlay-main">
                    <span class="text-[9px] tracking-[0.4em] text-[#f3e5ab] mb-2 uppercase">The Beginning</span>
                    <h3 class="text-xl font-bold">Wedding Project</h3>
                </div>
            </div>
            <div class="side-stack">
                <div class="wedding-item item-02">
                    <img src="Wedding-02.jpg" alt="Wedding 02">
                </div>
                <div class="wedding-item item-04">
                    <img src="Wedding-04.jpg" alt="Wedding 04">
                </div>
            </div>
        </div>

        <!-- 第二排組合：03 直式大圖與 (06+05) -->
        <div class="row-2-group">
            <div class="wedding-item item-03">
                <img src="Wedding-03.jpg" alt="Wedding 03">
            </div>
            <div class="side-stack-2">
                <div class="wedding-item item-06">
                    <img src="Wedding-06.jpg" alt="Wedding 06">
                </div>
                <div class="wedding-item item-05">
                    <img src="Wedding-05.jpg" alt="Wedding 05">
                </div>
            </div>
        </div>

        <!-- 第三排：正方形三連格 -->
        <div class="wedding-item item-07">
            <img src="Wedding-07.jpg" alt="Wedding 07">
        </div>
        <div class="wedding-item item-08">
            <img src="Wedding-08.jpg" alt="Wedding 08">
        </div>
        <div class="wedding-item item-09">
            <img src="Wedding-09.jpg" alt="Wedding 09">
        </div>

    </main>

    <nav class="category-nav">
        <a href="index.html" class="nav-item">精選</a>
        <a href="hair.html" class="nav-item">美髮商業</a>
        <a href="food.html" class="nav-item">美食影像</a>
        <a href="wedding.html" class="nav-item active">婚禮攝影</a>
    </nav>

</body>
</html>
