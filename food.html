<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <!-- 引入字體與圖示 -->
    <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Urbanist:wght@300;700&family=Noto+Sans+TC:wght@100;300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* 輝光背景 */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(243, 229, 171, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        /* 網格核心容器 */
        .grid-container {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            grid-template-rows: repeat(6, 1fr);
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            height: auto;
        }

        /* 骨架屏載入動畫與作品單元通用樣式 */
        .food-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite linear;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 圖片載入過渡效果 */
        .food-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0; /* 預設隱藏，等待 onload */
            transition: opacity 0.6s ease, transform 0.8s ease;
        }

        .food-item img.loaded {
            opacity: 1; /* 載入完成後顯示 */
        }

        /* 桌面版對齊邏輯 */
        @media (min-width: 1025px) {
            .food-01 { grid-column: 1; grid-row: 1 / span 3; }
            .food-02 { grid-column: 1; grid-row: 4 / span 3; }
            .food-03 { grid-column: 2; grid-row: 1 / span 2; }
            .food-04 { grid-column: 2; grid-row: 3 / span 2; }
            .food-05 { grid-column: 2; grid-row: 5 / span 2; }
            .food-06 { grid-column: 3; grid-row: 1 / span 2; }
            .food-07 { grid-column: 3; grid-row: 3 / span 2; }
            .food-08 { grid-column: 3; grid-row: 5 / span 2; }
            .col-ref { aspect-ratio: 1 / 1; }
        }

        /* 行動裝置排版 */
        @media (max-width: 1024px) {
            .grid-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                display: block;
            }
            .food-item {
                aspect-ratio: 16 / 9;
                margin-bottom: 1.5rem;
            }
        }

        .food-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 20;
        }

        .food-item:hover img.loaded {
            transform: scale(1.05);
        }

        .overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.4s ease;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 1.5rem;
        }

        .food-item:hover .overlay {
            opacity: 1;
        }

        /* 底部選單項目 hover 效果 */
        .menu-link-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 16px;
            color: #fff; text-decoration: none; transition: all 0.3s ease;
        }
        .menu-link-item:hover {
            background: rgba(255,255,255,0.08); transform: translateY(-2px); border-color: rgba(255,255,255,0.2);
        }

        /* 懸浮按鈕過渡動畫 */
        #fab-container { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in { animation: fadeInUp 1s ease forwards; }

        /* 放大視窗 (Lightbox) 的過渡動畫 */
        #lightbox { transition: opacity 0.3s ease; overscroll-behavior: contain; touch-action: none;}
        #lightbox-img { transition: opacity 0.2s ease, transform 0.3s cubic-bezier(0.165, 0.84, 0.44, 1); }
    </style>

    <!-- Lightbox 互動與選單邏輯 -->
    <script>
        // ================= Lightbox 升級邏輯 =================
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('lightbox-close');
        const prevBtn = document.getElementById('lightbox-prev');
        const nextBtn = document.getElementById('lightbox-next');
        const foodItems = document.querySelectorAll('.food-item');
        
        let currentImgIndex = 0;
        const imgSources = Array.from(foodItems).map(item => item.querySelector('img').src);

        // 更新圖片
        function updateLightboxImage() {
            lightboxImg.style.opacity = '0'; // 先淡出
            setTimeout(() => {
                lightboxImg.src = imgSources[currentImgIndex];
                lightboxImg.onload = () => {
                    lightboxImg.style.opacity = '1'; // 載入完成後淡入
                };
            }, 200);
        }

        // 開啟
        foodItems.forEach((item, index) => {
            item.addEventListener('click', () => {
                currentImgIndex = index;
                lightboxImg.src = imgSources[currentImgIndex];
                
                lightbox.classList.remove('hidden');
                lightbox.classList.add('flex');
                
                requestAnimationFrame(() => {
                    lightbox.classList.remove('opacity-0');
                    lightboxImg.classList.remove('scale-95');
                    lightboxImg.classList.add('scale-100');
                    lightboxImg.style.opacity = '1';
                });
            });
        });

        // 關閉
        const closeLightbox = () => {
            lightbox.classList.add('opacity-0');
            lightboxImg.classList.remove('scale-100');
            lightboxImg.classList.add('scale-95');
            
            setTimeout(() => {
                lightbox.classList.add('hidden');
                lightbox.classList.remove('flex');
                lightboxImg.src = '';
            }, 300);
        };

        // 上一張 / 下一張
        const showPrev = (e) => { if(e) e.stopPropagation(); currentImgIndex = (currentImgIndex - 1 + imgSources.length) % imgSources.length; updateLightboxImage(); };
        const showNext = (e) => { if(e) e.stopPropagation(); currentImgIndex = (currentImgIndex + 1) % imgSources.length; updateLightboxImage(); };

        closeBtn.addEventListener('click', closeLightbox);
        prevBtn.addEventListener('click', showPrev);
        nextBtn.addEventListener('click', showNext);
        
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        // 鍵盤支援
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('hidden')) {
                if (e.key === 'Escape') closeLightbox();
                else if (e.key === 'ArrowLeft') showPrev();
                else if (e.key === 'ArrowRight') showNext();
            }
        });

        // 手機版滑動支援 (左右切換、下滑關閉)
        let touchStartX = 0;
        let touchStartY = 0;

        lightbox.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        lightbox.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const deltaX = touchStartX - touchEndX;
            const deltaY = touchStartY - touchEndY;

            // 判斷是水平滑動還是垂直滑動
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 50) showNext(); // 往左滑 (看下一張)
                else if (deltaX < -50) showPrev(); // 往右滑 (看上一張)
            } else {
                if (deltaY < -60) closeLightbox(); // 往下滑 (關閉)
            }
        }, {passive: true});


        // ================= 底部滑動選單邏輯 =================
        const fabContainer = document.getElementById('fab-container');
        const fabMenu = document.getElementById('fab-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const bottomSheet = document.getElementById('bottom-sheet');
        const dragHandle = document.getElementById('drag-handle');

        function openMenu() {
            menuOverlay.classList.remove('opacity-0', 'pointer-events-none');
            bottomSheet.classList.remove('translate-y-full');
            fabContainer.classList.add('translate-y-[150%]', 'opacity-0'); 
            document.body.style.overflow = 'hidden'; 
        }

        function closeMenu() {
            menuOverlay.classList.add('opacity-0', 'pointer-events-none');
            bottomSheet.classList.add('translate-y-full');
            fabContainer.classList.remove('translate-y-[150%]', 'opacity-0'); 
            document.body.style.overflow = '';
        }

        fabMenu.addEventListener('click', openMenu);
        menuOverlay.addEventListener('click', closeMenu);
        dragHandle.addEventListener('click', closeMenu);

        let menuTouchStartY = 0;
        bottomSheet.addEventListener('touchstart', (e) => menuTouchStartY = e.touches[0].clientY);
        bottomSheet.addEventListener('touchmove', (e) => {
            if (e.touches[0].clientY - menuTouchStartY > 60) closeMenu();
        });

        // ================= 滾動半隱藏按鈕邏輯 =================
        let lastScrollY = window.scrollY;
        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;
            
            if (!bottomSheet.classList.contains('translate-y-full') || !lightbox.classList.contains('hidden')) return;

            if (currentScrollY > lastScrollY && currentScrollY > 100) {
                fabContainer.classList.add('opacity-40', 'translate-y-4', 'scale-90');
                fabContainer.classList.remove('opacity-100', 'translate-y-0', 'scale-100');
            } else {
                fabContainer.classList.remove('opacity-40', 'translate-y-4', 'scale-90');
                fabContainer.classList.add('opacity-100', 'translate-y-0', 'scale-100');
            }
            lastScrollY = currentScrollY;
        });

        fabContainer.addEventListener('mouseenter', () => {
            fabContainer.classList.remove('opacity-40', 'translate-y-4', 'scale-90');
            fabContainer.classList.add('opacity-100', 'translate-y-0', 'scale-100');
        });
        fabContainer.addEventListener('touchstart', () => {
            fabContainer.classList.remove('opacity-40', 'translate-y-4', 'scale-90');
            fabContainer.classList.add('opacity-100', 'translate-y-0', 'scale-100');
        }, {passive: true});

        // ================= 頁面過渡動畫邏輯 =================
        const pageTransition = document.getElementById('page-transition');
        
        // 進入頁面時淡入 (透明度變 0)
        window.addEventListener('pageshow', () => {
            pageTransition.classList.remove('opacity-100');
            pageTransition.classList.add('opacity-0');
        });

        // 點擊內部連結時淡出 (透明度變 1)
        document.querySelectorAll('a').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                const href = this.getAttribute('href');
                const target = this.getAttribute('target');
                
                // 判斷是否為站內跳轉連結 (不包含 target="_blank" 且有 href)
                if (href && !href.startsWith('#') && !href.startsWith('javascript') && target !== '_blank' && !this.hasAttribute('download')) {
                    e.preventDefault(); 
                    pageTransition.classList.remove('opacity-0');
                    pageTransition.classList.add('opacity-100');
                    
                    // 等待過渡動畫結束後跳轉 (500ms 需與 CSS transition duration 一致)
                    setTimeout(() => {
                        window.location.href = href;
                    }, 500);
                }
            });
        });

        // ================= 回到頂部按鈕邏輯 =================
        const backToTopBtn = document.getElementById('back-to-top');
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTopBtn.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
                backToTopBtn.classList.add('opacity-100', 'translate-y-0');
            } else {
                backToTopBtn.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
                backToTopBtn.classList.remove('opacity-100', 'translate-y-0');
            }
        });

        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

    </script>
</body>
</html>
