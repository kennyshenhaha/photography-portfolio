<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENNY SHEN | FOOD PHOTOGRAPHY</title>
    
    <!-- 引入字體與圖示 -->
    <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Urbanist:wght@300;700&family=Noto+Sans+TC:wght@100;300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* 輝光背景 */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(243, 229, 171, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        /* 網格核心容器 */
        .grid-container {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            grid-template-rows: repeat(6, 1fr);
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            height: auto;
        }

        /* 作品單元通用樣式 */
        .food-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background: #111;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .food-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
            display: block;
        }

        /* 桌面版對齊邏輯 */
        @media (min-width: 1025px) {
            .food-01 { grid-column: 1; grid-row: 1 / span 3; }
            .food-02 { grid-column: 1; grid-row: 4 / span 3; }
            .food-03 { grid-column: 2; grid-row: 1 / span 2; }
            .food-04 { grid-column: 2; grid-row: 3 / span 2; }
            .food-05 { grid-column: 2; grid-row: 5 / span 2; }
            .food-06 { grid-column: 3; grid-row: 1 / span 2; }
            .food-07 { grid-column: 3; grid-row: 3 / span 2; }
            .food-08 { grid-column: 3; grid-row: 5 / span 2; }
            .col-ref { aspect-ratio: 1 / 1; }
        }

        /* 行動裝置排版 */
        @media (max-width: 1024px) {
            .grid-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                display: block;
            }
            .food-item {
                aspect-ratio: 16 / 9;
                margin-bottom: 1.5rem;
            }
        }

        .food-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 20;
        }

        .food-item:hover img {
            transform: scale(1.05);
        }

        .overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.4s ease;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 1.5rem;
        }

        .food-item:hover .overlay {
            opacity: 1;
        }

        /* 底部選單項目 hover 效果 (新增) */
        .menu-link-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 16px;
            color: #fff; text-decoration: none; transition: all 0.3s ease;
        }
        .menu-link-item:hover {
            background: rgba(255,255,255,0.08); transform: translateY(-2px); border-color: rgba(255,255,255,0.2);
        }

        /* 懸浮按鈕過渡動畫 (新增) */
        #fab-container { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in { animation: fadeInUp 1s ease forwards; }

        /* 放大視窗 (Lightbox) 的過渡動畫 */
        #lightbox {
            transition: opacity 0.3s ease;
        }
        #lightbox-img {
            transition: transform 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">

    <div class="bg-glow"></div>

    <!-- ================= 懸浮選單按鈕區 (電腦版透白 / 手機版深黑 + 滾動半隱藏) ================= -->
    <div id="fab-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[900] flex items-center justify-center gap-3 w-max">
        <!-- 回首頁 -->
        <a href="https://kennyshenhaha.github.io/photography-portfolio/index.html" class="group flex items-center justify-center gap-2 w-32 md:w-36 py-3.5 rounded-full bg-black/80 md:bg-white/10 backdrop-blur-xl border border-white/15 md:border-white/20 hover:bg-white/20 text-white/90 md:text-white shadow-[0_10px_30px_rgba(0,0,0,0.8)] md:shadow-[0_0_30px_rgba(255,255,255,0.1)] transition-all">
            <i class="fa-solid fa-house text-base group-hover:scale-110 transition-transform"></i>
            <span class="text-xs md:text-sm font-bold tracking-widest">回首頁</span>
        </a>
        <!-- 探索作品 -->
        <button id="fab-menu" class="group flex items-center justify-center gap-2 w-32 md:w-36 py-3.5 rounded-full bg-black/80 md:bg-white/10 backdrop-blur-xl border border-white/15 md:border-white/20 hover:bg-white/20 text-white/90 md:text-white shadow-[0_10px_30px_rgba(0,0,0,0.8)] md:shadow-[0_0_30px_rgba(255,255,255,0.1)] transition-all">
            <i class="fa-solid fa-layer-group text-base group-hover:scale-110 transition-transform"></i>
            <span class="text-xs md:text-sm font-bold tracking-widest">探索作品</span>
        </button>
    </div>

    <header class="mb-12 animate-fade-in">
        <a href="https://kennyshenhaha.github.io/photography-portfolio/index.html" class="text-[10px] tracking-[0.4em] text-white/40 hover:text-white transition-colors mb-4 inline-block uppercase">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back to Main
        </a>
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight">
            美食影像 <span class="text-white/20 ml-2 font-light italic text-xl md:text-3xl">Culinary Visuals</span>
        </h1>
        <div class="h-[1px] w-12 bg-[#f3e5ab] mt-6 opacity-60"></div>
    </header>

    <!-- 網格區 -->
    <main class="grid-container mb-40 animate-fade-in" style="animation-delay: 0.2s;">
        <div class="food-item food-01">
            <img src="Food-01.jpg" alt="Food 01" onerror="this.src='https://via.placeholder.com/600x800/111/fff?text=Food+01'">
            <div class="overlay">
                <span class="text-[9px] tracking-[0.3em] text-[#f3e5ab] mb-2 uppercase">Signature</span>
                <h3 class="text-lg font-bold">Dessert Project 01</h3>
            </div>
        </div>
        <div class="food-item food-02">
            <img src="Food-02.jpg" alt="Food 02" onerror="this.src='https://via.placeholder.com/600x800/111/fff?text=Food+02'">
            <div class="overlay"><h3 class="text-lg font-bold">02</h3></div>
        </div>
        <div class="food-item food-03 col-ref">
            <img src="Food-03.jpg" alt="Food 03" onerror="this.src='https://via.placeholder.com/600x600/111/fff?text=Food+03'">
            <div class="overlay"><h3 class="text-sm font-bold">03</h3></div>
        </div>
        <div class="food-item food-04 col-ref">
            <img src="Food-04.jpg" alt="Food 04" onerror="this.src='https://via.placeholder.com/600x600/111/fff?text=Food+04'">
            <div class="overlay"><h3 class="text-sm font-bold">04</h3></div>
        </div>
        <div class="food-item food-05 col-ref">
            <img src="Food-05.jpg" alt="Food 05" onerror="this.src='https://via.placeholder.com/600x600/111/fff?text=Food+05'">
            <div class="overlay"><h3 class="text-sm font-bold">05</h3></div>
        </div>
        <div class="food-item food-06 col-ref">
            <img src="Food-06.jpg" alt="Food 06" onerror="this.src='https://via.placeholder.com/600x600/111/fff?text=Food+06'">
            <div class="overlay"><h3 class="text-sm font-bold">06</h3></div>
        </div>
        <div class="food-item food-07 col-ref">
            <img src="Food-07.jpg" alt="Food 07" onerror="this.src='https://via.placeholder.com/600x600/111/fff?text=Food+07'">
            <div class="overlay"><h3 class="text-sm font-bold">07</h3></div>
        </div>
        <div class="food-item food-08 col-ref">
            <img src="Food-08.jpg" alt="Food 08" onerror="this.src='https://via.placeholder.com/600x600/111/fff?text=Food+08'">
            <div class="overlay"><h3 class="text-sm font-bold">08</h3></div>
        </div>
    </main>

    <!-- 照片放大用的 Lightbox 容器 (預設隱藏) -->
    <div id="lightbox" class="fixed inset-0 bg-black/95 z-[2000] hidden flex-col items-center justify-center opacity-0">
        <button id="lightbox-close" class="absolute top-6 right-6 md:top-10 md:right-10 text-white/50 hover:text-white text-4xl cursor-pointer z-50 transition-colors">
            &times;
        </button>
        <img id="lightbox-img" src="" alt="Enlarged view" class="max-w-[95vw] max-h-[90vh] object-contain scale-95 shadow-2xl">
    </div>

    <!-- ================= 底部滑動選單 (Bottom Sheet) ================= -->
    <div id="menu-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-md z-[1000] opacity-0 pointer-events-none transition-opacity duration-300"></div>
    <div id="bottom-sheet" class="fixed bottom-0 left-0 right-0 bg-[#0a0a0a] border-t border-white/10 rounded-t-3xl z-[1001] transform translate-y-full transition-transform duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] flex flex-col max-h-[85vh] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        
        <div class="w-full flex justify-center py-5 cursor-pointer hover:bg-white/5 transition-colors rounded-t-3xl" id="drag-handle">
            <div class="w-12 h-1.5 bg-white/20 rounded-full"></div>
        </div>
        
        <div class="px-6 pb-12 overflow-y-auto">
            <h3 class="text-white/40 text-[10px] md:text-xs tracking-[0.3em] mb-6 text-center">PORTFOLIO CATEGORIES</h3>
            <div class="flex flex-col gap-3 max-w-md mx-auto">
                <a href="https://www.youtube.com/watch?v=R8OsDnJ_6wI" target="_blank" class="menu-link-item group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-[#f09433] via-[#e6683c] to-[#bc1888] flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-images text-lg group-hover:scale-110 transition-transform"></i></div>
                        <span class="font-bold tracking-wide text-sm md:text-base">影像作品集</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-white/30 text-sm group-hover:translate-x-1 transition-transform"></i>
                </a>
                <a href="https://www.instagram.com/kshen_life?igsh=OWZ4ZGs4cHhzb3Rz&utm_source=qr" target="_blank" class="menu-link-item group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-[#f09433] via-[#e6683c] to-[#bc1888] flex items-center justify-center text-white shadow-lg"><i class="fa-brands fa-instagram text-xl group-hover:scale-110 transition-transform"></i></div>
                        <span class="font-bold tracking-wide text-sm md:text-base">短影音 Reels</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-white/30 text-sm group-hover:translate-x-1 transition-transform"></i>
                </a>
                <a href="https://youtu.be/YLsqzahcr3g" target="_blank" class="menu-link-item group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-[#f09433] via-[#e6683c] to-[#bc1888] flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-scissors text-lg group-hover:scale-110 transition-transform"></i></div>
                        <span class="font-bold tracking-wide text-sm md:text-base">美髮商業</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-white/30 text-sm group-hover:translate-x-1 transition-transform"></i>
                </a>
                <a href="https://photos.google.com/share/AF1QipOcqOXF-cWqF4ASgcmQkWf2sZieUTP7I8cJAiC6oycsSuxs85urrxEGt_gHnFftbQ?pli=1&key=WFd6U0Q3ckV4Ylh2STl6Ty1iaVBZV2VSNGh2ZGVB" target="_blank" class="menu-link-item group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-[#0ea5e9] via-[#2563eb] to-[#3730a3] flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-camera-retro text-lg group-hover:scale-110 transition-transform"></i></div>
                        <span class="font-bold tracking-wide text-sm md:text-base">人像創作</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-white/30 text-sm group-hover:translate-x-1 transition-transform"></i>
                </a>
                <a href="https://kennyshenhaha.github.io/photography-portfolio/food.html" class="menu-link-item group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-[#0ea5e9] via-[#2563eb] to-[#3730a3] flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-utensils text-lg group-hover:scale-110 transition-transform"></i></div>
                        <span class="font-bold tracking-wide text-sm md:text-base">美食影像</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-white/30 text-sm group-hover:translate-x-1 transition-transform"></i>
                </a>
                <a href="https://kennyshenhaha.github.io/photography-portfolio/wedding.html" class="menu-link-item group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-[#0ea5e9] via-[#2563eb] to-[#3730a3] flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-ring text-lg group-hover:scale-110 transition-transform"></i></div>
                        <span class="font-bold tracking-wide text-sm md:text-base">婚禮攝影</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-white/30 text-sm group-hover:translate-x-1 transition-transform"></i>
                </a>
            </div>
        </div>
    </div>

    <!-- Lightbox 互動與選單邏輯 -->
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('lightbox-close');
        const foodItems = document.querySelectorAll('.food-item');

        // 選單與懸浮按鈕變數
        const fabContainer = document.getElementById('fab-container');
        const fabMenu = document.getElementById('fab-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const bottomSheet = document.getElementById('bottom-sheet');
        const dragHandle = document.getElementById('drag-handle');

        // ================= Lightbox 圖片放大邏輯 =================
        foodItems.forEach(item => {
            item.addEventListener('click', () => {
                const imgSrc = item.querySelector('img').src;
                lightboxImg.src = imgSrc;
                lightbox.classList.remove('hidden');
                lightbox.classList.add('flex');
                
                requestAnimationFrame(() => {
                    lightbox.classList.remove('opacity-0');
                    lightboxImg.classList.remove('scale-95');
                    lightboxImg.classList.add('scale-100');
                });
            });
        });

        const closeLightbox = () => {
            lightbox.classList.add('opacity-0');
            lightboxImg.classList.remove('scale-100');
            lightboxImg.classList.add('scale-95');
            setTimeout(() => {
                lightbox.classList.add('hidden');
                lightbox.classList.remove('flex');
                lightboxImg.src = '';
            }, 300);
        };

        closeBtn.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !lightbox.classList.contains('hidden')) closeLightbox(); });

        // ================= 底部滑動選單邏輯 =================
        function openMenu() {
            menuOverlay.classList.remove('opacity-0', 'pointer-events-none');
            bottomSheet.classList.remove('translate-y-full');
            fabContainer.classList.add('translate-y-[150%]', 'opacity-0'); // 打開選單時隱藏按鈕
            document.body.style.overflow = 'hidden'; 
        }

        function closeMenu() {
            menuOverlay.classList.add('opacity-0', 'pointer-events-none');
            bottomSheet.classList.add('translate-y-full');
            fabContainer.classList.remove('translate-y-[150%]', 'opacity-0'); // 關閉選單時顯示按鈕
            document.body.style.overflow = '';
        }

        fabMenu.addEventListener('click', openMenu);
        menuOverlay.addEventListener('click', closeMenu);
        dragHandle.addEventListener('click', closeMenu);

        let touchStartY = 0;
        bottomSheet.addEventListener('touchstart', (e) => touchStartY = e.touches[0].clientY);
        bottomSheet.addEventListener('touchmove', (e) => {
            if (e.touches[0].clientY - touchStartY > 60) closeMenu();
        });

        // ================= 滾動半隱藏按鈕邏輯 =================
        let lastScrollY = window.scrollY;
        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;
            
            // 如果畫面正處於選單打開的狀態，或有圖片放大中，不做任何事
            if (!bottomSheet.classList.contains('translate-y-full') || !lightbox.classList.contains('hidden')) return;

            // 往下滾動時，按鈕半透明微降
            if (currentScrollY > lastScrollY && currentScrollY > 100) {
                fabContainer.classList.add('opacity-40', 'translate-y-4', 'scale-90');
                fabContainer.classList.remove('opacity-100', 'translate-y-0', 'scale-100');
            } 
            // 往上滾動時，恢復顯示
            else {
                fabContainer.classList.remove('opacity-40', 'translate-y-4', 'scale-90');
                fabContainer.classList.add('opacity-100', 'translate-y-0', 'scale-100');
            }
            lastScrollY = currentScrollY;
        });

        // 當手指碰到或滑鼠移過去半透明按鈕時，自動恢復狀態
        fabContainer.addEventListener('mouseenter', () => {
            fabContainer.classList.remove('opacity-40', 'translate-y-4', 'scale-90');
            fabContainer.classList.add('opacity-100', 'translate-y-0', 'scale-100');
        });
        fabContainer.addEventListener('touchstart', () => {
            fabContainer.classList.remove('opacity-40', 'translate-y-4', 'scale-90');
            fabContainer.classList.add('opacity-100', 'translate-y-0', 'scale-100');
        }, {passive: true});

    </script>
</body>
</html>
