<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENNY SHEN | FOOD PHOTOGRAPHY</title>
    <!-- 引入字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&family=Noto+Sans+TC:wght@100;300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* 輝光背景 */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(243, 229, 171, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        /* 網格核心容器 */
        .grid-container {
            display: grid;
            /* 定義 3 欄，且定義 6 個等高的行 (2與3的最小公倍數) */
            grid-template-columns: 1.5fr 1fr 1fr;
            grid-template-rows: repeat(6, 1fr);
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            /* 關鍵：強制容器高度由內容決定，並讓內部的 item 填滿 */
            height: auto;
        }

        /* 作品單元通用樣式 */
        .food-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background: #111;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            width: 100%;
            height: 100%; /* 讓它填滿 Grid 指定的區域 */
        }

        .food-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保圖片填滿格位且不變形 */
            transition: transform 0.8s ease;
            display: block;
        }

        /* 桌面版對齊邏輯 */
        @media (min-width: 1025px) {
            /* 左側大圖：Food-01 佔據前 3 行，Food-02 佔據後 3 行 */
            .food-01 { grid-column: 1; grid-row: 1 / span 3; }
            .food-02 { grid-column: 1; grid-row: 4 / span 3; }

            /* 中間小圖：三張各佔 2 行 */
            .food-03 { grid-column: 2; grid-row: 1 / span 2; }
            .food-04 { grid-column: 2; grid-row: 3 / span 2; }
            .food-05 { grid-column: 2; grid-row: 5 / span 2; }

            /* 右側小圖：三張各佔 2 行 */
            .food-06 { grid-column: 3; grid-row: 1 / span 2; }
            .food-07 { grid-column: 3; grid-row: 3 / span 2; }
            .food-08 { grid-column: 3; grid-row: 5 / span 2; }
            
            /* 為了讓小圖保持正方形感覺，我們讓中間的小圖設定 aspect-ratio */
            .col-ref { aspect-ratio: 1 / 1; }
        }

        /* 行動裝置排版 */
        @media (max-width: 1024px) {
            .grid-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                display: block;
            }
            .food-item {
                aspect-ratio: 16 / 9;
                margin-bottom: 1.5rem;
            }
        }

        .food-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 20;
        }

        .food-item:hover img {
            transform: scale(1.05);
        }

        /* 資訊浮層 */
        .overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.4s ease;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 1.5rem;
        }

        .food-item:hover .overlay {
            opacity: 1;
        }

        /* 導覽列 */
        .category-nav {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 1000;
            background: rgba(15, 15, 15, 0.6); padding: 8px; border-radius: 50px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            padding: 10px 24px; border-radius: 40px; font-size: 13px;
            letter-spacing: 0.1em; color: rgba(255,255,255,0.6);
            text-decoration: none; transition: all 0.4s ease;
        }

        .nav-item:hover { color: #fff; background: rgba(255, 255, 255, 0.1); }
        .nav-item.active { color: #000; background: #f3e5ab; font-weight: 700; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in { animation: fadeInUp 1s ease forwards; }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">

    <div class="bg-glow"></div>

    <header class="mb-12 animate-fade-in">
        <a href="index.html" class="text-[10px] tracking-[0.4em] text-white/40 hover:text-white transition-colors mb-4 inline-block uppercase">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back to Main
        </a>
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight">
            美食影像 <span class="text-white/20 ml-2 font-light italic text-xl md:text-3xl">Culinary Visuals</span>
        </h1>
        <div class="h-[1px] w-12 bg-[#f3e5ab] mt-6 opacity-60"></div>
    </header>

    <!-- 網格區：直接將所有 item 放進同一個 Grid 容器中進行精準定位 -->
    <main class="grid-container mb-40 animate-fade-in" style="animation-delay: 0.2s;">
        
        <!-- 左側大圖 -->
        <div class="food-item food-01">
            <img src="Food-01.jpg" alt="Food 01">
            <div class="overlay">
                <span class="text-[9px] tracking-[0.3em] text-[#f3e5ab] mb-2 uppercase">Signature</span>
                <h3 class="text-lg font-bold">Dessert Project 01</h3>
            </div>
        </div>
        <div class="food-item food-02">
            <img src="Food-02.jpg" alt="Food 02">
            <div class="overlay">
                <h3 class="text-lg font-bold">02</h3>
            </div>
        </div>

        <!-- 中間小圖 -->
        <div class="food-item food-03 col-ref">
            <img src="Food-03.jpg" alt="Food 03">
            <div class="overlay"><h3 class="text-sm font-bold">03</h3></div>
        </div>
        <div class="food-item food-04 col-ref">
            <img src="Food-04.jpg" alt="Food 04">
            <div class="overlay"><h3 class="text-sm font-bold">04</h3></div>
        </div>
        <div class="food-item food-05 col-ref">
            <img src="Food-05.jpg" alt="Food 05">
            <div class="overlay"><h3 class="text-sm font-bold">05</h3></div>
        </div>

        <!-- 右側小圖 -->
        <div class="food-item food-06 col-ref">
            <img src="Food-06.jpg" alt="Food 06">
            <div class="overlay"><h3 class="text-sm font-bold">06</h3></div>
        </div>
        <div class="food-item food-07 col-ref">
            <img src="Food-07.jpg" alt="Food 07">
            <div class="overlay"><h3 class="text-sm font-bold">07</h3></div>
        </div>
        <div class="food-item food-08 col-ref">
            <img src="Food-08.jpg" alt="Food 08">
            <div class="overlay"><h3 class="text-sm font-bold">08</h3></div>
        </div>

    </main>

    <!-- 底部導覽列 -->
    <nav class="category-nav">
        <a href="index.html" class="nav-item">作品集</a>
        <a href="hair.html" class="nav-item">美髮商業</a>
        <a href="food.html" class="nav-item active">美食影像</a>
        <a href="wedding.html" class="nav-item">婚禮攝影</a>
    </nav>

</body>
</html>
